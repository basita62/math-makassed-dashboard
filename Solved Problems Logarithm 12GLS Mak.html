    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"
        onload="renderMathInElement(document.body, {
            delimiters: [
                {left: '$$', right: '$$', display: true},
                {left: '$', right: '$', display: false},
                {left: '\\(', right: '\\)', display: false},
                {left: '\\[', right: '\\]', display: true}
            ],
            throwOnError: false
        });">
        </script>

 <style>
/* 1. Global Variables & Base Setup */
:root {
    --accent: #2563eb;       /* Primary Blue */
    --accent-bg: #e7f3ff;    /* Light Blue for active states */
    --star-color: #f59e0b;   /* Gold for ratings */
    --bg-sidebar: #f8f9fa;   /* Light gray sidebar */
    --border-color: #e0e0e0;
    --text-main: #333;
    --text-muted: #64748b;
}

body {
    display: flex;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    margin: 0;
    height: 100vh;
    color: var(--text-main);
    overflow: hidden; /* Prevents double scrollbars */
}

/* 2. Sidebar & Search Layout */
#sidebar {
    width: 300px;
    border-right: 1px solid var(--border-color);
    padding: 20px;
    display: flex;
    flex-direction: column;
    background: var(--bg-sidebar);
    box-sizing: border-box;
}

#search-box {
    width: 100%;
    padding: 12px;
    margin-bottom: 20px;
    border: 2px solid var(--border-color);
    border-radius: 8px;
    font-size: 1rem;
    outline: none;
    transition: border-color 0.2s;
    box-sizing: border-box;
}

#search-box:focus {
    border-color: var(--accent);
}

#nav-list {
    overflow-y: auto;
    flex-grow: 1;
}

/* 3. Collapsible Sidebar Items */
.sidebar-group {
    margin-bottom: 8px;
}

/* Remove default browser arrows */
summary {
    list-style: none;
    outline: none;
}
summary::-webkit-details-marker {
    display: none;
}

/* Main Clickable Topic Title */
.compact-title {
    padding: 12px 15px;
    cursor: pointer;
    background: #ffffff;
    border: 1px solid var(--border-color);
    border-radius: 6px;
    font-weight: 600;
    transition: all 0.2s;
    border-left: 4px solid transparent;
    display: block;
}

.compact-title:hover {
    background-color: #edf2f7;
}

/* Active/Selected Highlight */
.compact-title.active-link,
details[open] .compact-title {
    background-color: var(--accent-bg);
    color: var(--accent);
    border-left-color: var(--accent);
}

/* Sub-problem Bullet List */
.parts-list {
    margin: 8px 0 15px 35px;
    padding: 0;
    list-style-type: disc;
    color: var(--text-muted);
    font-size: 0.85em;
}

.parts-list li {
    margin-bottom: 5px;
}

/* 4. Main Content Area */
#content {
    flex: 1;
    padding: 40px 60px;
    overflow-y: auto;
    background: white;
}

.puzzle-card {
    border: 1px solid var(--border-color);
    padding: 25px;
    border-radius: 12px;
    margin-bottom: 30px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 15px;
}

h3 {
    margin: 0;
    font-size: 1.3rem;
    color: #1a202c;
}

/* Solution Box Styling */
.answer-link {
    display: inline-block;
    color: var(--accent);
    cursor: pointer;
    font-weight: 600;
    margin-top: 20px;
}

.answer-box {
    background: #f0f7ff;
    padding: 20px;
    margin-top: 15px;
    border-left: 5px solid var(--accent);
    border-radius: 4px;
}

/* 5. Utility Classes */
.hidden {
    display: none !important;
}

.image-div img {
    max-width: 100%;
    border-radius: 8px;
    margin: 15px 0;
}

.math-image {
    display: block;
    max-width: 100%; /* Prevents image from overflowing card */
    height: auto;
    margin: 15px auto; /* Centers the image with spacing */
    border-radius: 8px; /* Matches card aesthetic */
    border: 1px solid #eee; /* Light border to define the image area */
}

/* Hide the answer box by default */
.hidden {
    display: none;
}

.puzzle-card h3 {
    font-weight: bold !important;
    display: block;
    font-size: 1.25rem; /* Adjust as needed */
    margin-bottom: 0.5rem;
}

</style>

</head>

        "title": "Part B. Parent function f",
        "content": "Consider the function $f$ defined over $]0;+\\infty[$ as $f(x) = \\cfrac{-1 + \\ln x}{x} - 2x + 4$ where $(C)$ is the curve representing $f$ in an orthonormal system $(O;\\vec{i},\\vec{j})$.",

    {
        "id": "B1a",
        "type": "question",
        "title": "Limit at 0",
        "question": "Calculate $\\lim\\limits_{x \\to 0^+} f(x)$. Deduce the equation of an asymptote to $(C)$.",
        "answer": "$\\lim\\limits_{x \\to 0^+} f(x) = \\lim\\limits_{x \\to 0^+} \\left( \\cfrac{-1 + \\ln x}{x} - 2x + 4 \\right) = -\\infty - 0 + 4 = -\\infty$. <br> The line $x = 0$ (y-axis) is a vertical asymptote to $(C)$.",

        "answer": "$\\lim\\limits_{x \\to +\\infty} f(x) = \\lim\\limits_{x \\to +\\infty} \\left( \\cfrac{-1}{x} + \\cfrac{\\ln x}{x} - 2x + 4 \\right) = 0 + 0 -\\infty = -\\infty$.",

        "id": "B1c",
        "type": "question",
        "title": "Oblique Asymptote",
        "question": "Prove that the straight line $(d)$ of equation $y = -2x + 4$ is an asymptote to $(C)$, then study the relative position of $(C)$ and $(d)$.",
        "answer": "$\\lim\\limits_{x \\to +\\infty} [f(x) - (-2x + 4)] = \\lim\\limits_{x \\to +\\infty} \\cfrac{-1 + \\ln x}{x} = \\lim\\limits_{x \\to +\\infty} (\\cfrac{-1}{x} + \\cfrac{\\ln x}{x}) = 0$. <br> Thus, $(d): y = -2x + 4$ is an oblique asymptote at $+\\infty$. <br> Relative position: Study the sign of $f(x) - y_d = \\cfrac{-1 + \\ln x}{x}$. <br> - If $-1 + \\ln x = 0$, then $\\ln x = 1$, then $x = e$, the curve $(C)$ intersects $(d)$ at $(e , -2e+4)$. <br> - For $x \\in ]0; e[$, $\\ln x < 1$, so $f(x) - y_d < 0$, $(C)$ is below $(d)$. <br> - For $x \\in ]e; +\\infty[$, $\\ln x > 1$, so $f(x) - y_d > 0$, $(C)$ is above $(d)$.",

        "question": "Prove that $f'(x) = \\cfrac{g(x)}{x^2}$ for all $x$ in the interval $]0;+\\infty[$.",

        "type": "question",
        "title": "Derivative of h at 0",
        "question": "Prove that the slope of the tangent to the curve of the function $h$ at the point of abscissa zero is equal to $\\cfrac{\\alpha^2}{-4\\alpha^2 + 4\\alpha + 1}$.",
        "answer": "The slope is $h'(0) = \\cfrac{1}{f'(\\alpha)}$. <br> $f'(\\alpha) = \\cfrac{g(\\alpha)}{\\alpha^2} = \\cfrac{-2\\alpha^2 + 2 - \\ln \\alpha}{\\alpha^2}$. <br> Since $f(\\alpha) = 0$, we have $\\cfrac{-1 + \\ln \\alpha}{\\alpha} - 2\\alpha + 4 = 0$, then $\\ln \\alpha = 2\\alpha^2 - 4\\alpha + 1$. <br> Substitute $\\ln \\alpha$ into $g(\\alpha)$: <br> $g(\\alpha) = -2\\alpha^2 + 2 - (2\\alpha^2 - 4\\alpha + 1) = -4\\alpha^2 + 4\\alpha + 1$. <br> Thus, $f'(\\alpha) = \\cfrac{-4\\alpha^2 + 4\\alpha + 1}{\\alpha^2}$ and $h'(0) = \\cfrac{\\alpha^2}{-4\\alpha^2 + 4\\alpha + 1}$.",

            "title": "Determination of a",
            "question": "Prove that $a = 1$.",
            "answer": "We know from the table that $g(0) = 0$. <br> Plugging $x=0$ into the expression: <br> $g(0) = (0 + a)^2 - a + \\ln(0 + 1) = a^2 - a + 0$. <br> Setting $g(0) = 0$ gives $a^2 - a = 0$, so $a(a - 1) = 0$. <br> Since $a$ is a non-zero real number, we conclude $a = 1$.",

            "content": "Let $f$ be the function defined over $]-1;+\\infty[$ as : $f(x) = x - \\cfrac{\\ln(x + 1)}{x + 1}$ and designate by $(C)$ its representative curve in an orthonormal system $(O; \\vec{i}, \\vec{j})$.",

            "question": "Calculate $\\lim\\limits_{x \\to -1^+} f(x)$. Deduce an asymptote to $(C)$.",
            "answer": "$\\lim\\limits_{x \\to -1^+} \\cfrac{\\ln(1+x)}{1+x} = \\cfrac{-\\infty}{0^+} = -\\infty$. <br> Thus, $\\lim\\limits_{x \\to -1^+} f(x) = -1 - (-\\infty) = +\\infty$. <br> The line $x = -1$ is a vertical asymptote to $(C)$.",

        {
            "id": "B2",
            "type": "question",
            "title": "Limit at $+\\infty$ and Relative Positions",
            "question": "Calculate $\\lim\\limits_{x \\to +\\infty} f(x)$. Prove that the line $(d): y = x$ is an asymptote to $(C)$ and study the relative positions of $(C)$ and $(d)$.",
            "answer": "By L'Hopital's rule, $\\lim\\limits_{x \\to +\\infty} \\cfrac{\\ln(1+x)}{1+x} = 0$, so $\\lim\\limits_{x \\to +\\infty} f(x) = +\\infty$. <br> Since $\\lim\\limits_{x \\to +\\infty} [f(x) - x] = \\lim\\limits_{x \\to +\\infty} [-\\cfrac{\\ln(1+x)}{1+x}] = 0$, $y=x$ is an oblique asymptote. <br> Relative position: $f(x) - x = -\\cfrac{\\ln(1+x)}{1+x}$. <br> - On $]-1; 0[$, $\\ln(1+x) < 0$, so $f(x) - x > 0$ ($(C)$ is above $(d)$). <br> - At $x = 0$, $(C)$ intersects $(d)$ at $(0;0)$. <br> - On $]0; +\\infty[$, $\\ln(1+x) > 0$, so $f(x) - x < 0$ ($(C)$ is below $(d)$).",

            "aImg": ""

            "question": "Prove that $f$ admits an inverse function $f^{-1}$ over $[0; +\\infty[$ and determine its domain and draw its representative curve $(C').$",

            "title": "Parallel Tangent",
            "question": "Determine the point $E$ of $(C')$ where the tangent is parallel to $y = x$.",
            "answer": "The tangent to $(C')$ is parallel to $y=x$ where $(f^{-1})'(x) = 1$. This occurs where $f'(y) = 1$. <br> $\\cfrac{g(y)}{(1+y)^2} = 1 \\implies (1+y)^2 - 1 + \\ln(1+y) = (1+y)^2 \\implies \\ln(1+y) = 1 \\implies y = e-1$. <br> $f(e-1) = e - 1 - \\cfrac{1}{e}$. So $E$ is $(e - 1 - \\cfrac{1}{e}; e-1)$.",

    {
        "id": "Cintro",
        "type": "context",
        "title": "Part C: Analysis of h(x)",
        "content": "Consider the function $h$ defined over$x \\in ]0; +\\infty[$ by $h(x) = \\sqrt{f(x)}$.",
        "qImg": ""
    },
    {
        "id": "C1",
        "type": "question",
        "title": "Minimum of h",
        "question": "For what values of $x$ is function $h$ minimum? Determine the minimum of $h$.",
        "answer": "$h'(x) = \\cfrac{f'(x)}{2\\sqrt{f(x)}}$. <br> $h'(x)$ has the same sign as $f'(x)$, so $h$ is minimum at $x = \\alpha$. <br> The minimum value is $h(\\alpha) = \\sqrt{f(\\alpha)} = \\sqrt{\\alpha^2(1 + \\alpha^2)} = \\alpha\\sqrt{1 + \\alpha^2}$ (since $\\alpha > 0$).",
        "qImg": "",
        "aImg": ""
    }
   ]
   }





        ];


        function init() {
            const nav = document.getElementById('nav-list');
            nav.innerHTML = '';
            const scrollTarget = document.getElementById('content'); // Get the scrollable div

            courseData.forEach((topic, tIdx) => {
                const details = document.createElement('details');
                details.className = 'sidebar-group';

                const summary = document.createElement('summary');
                summary.className = 'compact-title';
                summary.innerHTML = `${tIdx + 1}. ${topic.mainTitle}`;

                // 1. INITIAL STATE (Runs once per refresh for the first item)
                if (tIdx === 0) {
                    summary.classList.add('active-link');
                    details.open = true;
                    displayTopic(tIdx);

                    // Fix: Scroll to top on page load
                    if (scrollTarget) scrollTarget.scrollTop = 0;
                }

                // 2. CLICK LOGIC
                summary.onclick = (e) => {
                    document.querySelectorAll('.compact-title').forEach(el => el.classList.remove('active-link'));
                    document.querySelectorAll('.sidebar-group').forEach(det => {
                        if (det !== details) det.open = false;
                    });

                    summary.classList.add('active-link');
                    displayTopic(tIdx);

                    // Fix: Scroll to top when clicking a new problem
                    if (scrollTarget) {
                        scrollTarget.scrollTo({ top: 0, behavior: 'smooth' });
                    }
                };

                const ul = document.createElement('ul');
                ul.className = 'parts-list';
                topic.parts.forEach(p => {
                    const li = document.createElement('li');
                    li.innerText = p.title.replace(/^Part\s[A-Z]:\s/i, "");
                    ul.appendChild(li);
                });

                details.appendChild(summary);
                details.appendChild(ul);
                nav.appendChild(details);
            });
            document.getElementById('count-display').innerText = courseData.length;
        }


function displayTopic(index) {
    const container = document.getElementById('problem-container');
    container.innerHTML = '';
    const topic = courseData[index];
    const section = document.createElement('div');
    section.className = 'topic-section';

    // Helper to generate Image HTML if a string exists
    const getImageHTML = (imgData) => {
        if (!imgData || imgData.trim() === "") return "";

        // Add prefix if user forgot to include it in the JSON string
        const src = imgData.startsWith('data:image')
                    ? imgData
                    : `data:image/png;base64,${imgData}`;

        return `<img src="${src}" class="math-image" alt="Problem Illustration">`;
    };

    topic.parts.forEach(p => {
        const card = document.createElement('div');
        card.className = 'puzzle-card';

        if (p.type === "context") {
            card.innerHTML = `
                <div class="header"><h3>${p.title}</h3></div>
                <div class="question-body">${p.content}</div>
                ${getImageHTML(p.qImg)}
            `;
        } else {
            card.innerHTML = `
                <div class="header"><h3>${p.id}. ${p.title}</h3></div>
                <div class="question-body">${p.question}</div>
                ${getImageHTML(p.qImg)}

                <div class="answer-link" onclick="toggleAns('${p.id}')">View Solution ▼</div>

                <div id="ans-box-${p.id}" class="answer-box hidden">
                    <div>${p.answer}</div>
                    ${getImageHTML(p.aImg)}
                </div>
            `;
        }
        section.appendChild(card);
    });

    container.appendChild(section);

    // Re-run KaTeX if present
    if (window.renderMathInElement) {
        renderMathInElement(container, {
            delimiters: [
                {left: '$$', right: '$$', display: true},
                {left: '$', right: '$', display: false}
            ],
            throwOnError: false
        });
    }
}






function filterContent() {
        const query = document.getElementById('search-box').value.toLowerCase();
        const sidebarGroups = document.querySelectorAll('.sidebar-group');
        let visibleCount = 0;

        courseData.forEach((topic, index) => {
                const sidebar = sidebarGroups[index];
                const match = topic.mainTitle.toLowerCase().includes(query) ||
                                            topic.parts.some(p => p.title.toLowerCase().includes(query));

                if (match) {
                        sidebar.classList.remove('hidden');
                        visibleCount++;
                } else {
                        sidebar.classList.add('hidden');
                }
        });

        document.getElementById('count-display').innerText = visibleCount;
}






function toggleAns(id) {
    const box = document.getElementById(`ans-box-${id}`);
    if (box) {
        box.classList.toggle('hidden');
    }
}


window.onload = init;
</script>
