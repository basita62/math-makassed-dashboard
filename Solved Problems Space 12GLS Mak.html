 <!-- KaTeX Auto-Render Extension with Custom Delimiter Config -->
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"
        onload="renderMathInElement(document.body, {
            delimiters: [
                {left: '$$', right: '$$', display: true},
                {left: '$', right: '$', display: false},
                {left: '\\(', right: '\\)', display: false},
                {left: '\\[', right: '\\]', display: true}
            ],
            throwOnError: false
        });">
        </script>

 <style>
/* 1. Global Variables & Base Setup */
:root {
    --accent: #2563eb;       /* Primary Blue */
    --accent-bg: #e7f3ff;    /* Light Blue for active states */
    --star-color: #f59e0b;   /* Gold for ratings */
    --bg-sidebar: #f8f9fa;   /* Light gray sidebar */
    --border-color: #e0e0e0;
    --text-main: #333;
    --text-muted: #64748b;
}

body {
    display: flex;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    margin: 0;
    height: 100vh;
    color: var(--text-main);
    overflow: hidden; /* Prevents double scrollbars */
}

/* 2. Sidebar & Search Layout */
#sidebar {
    width: 300px;
    border-right: 1px solid var(--border-color);
    padding: 20px;
    display: flex;
    flex-direction: column;
    background: var(--bg-sidebar);
    box-sizing: border-box;
}

#search-box {
    width: 100%;
    padding: 12px;
    margin-bottom: 20px;
    border: 2px solid var(--border-color);
    border-radius: 8px;
    font-size: 1rem;
    outline: none;
    transition: border-color 0.2s;
    box-sizing: border-box;
}

#search-box:focus {
    border-color: var(--accent);
}

#nav-list {
    overflow-y: auto;
    flex-grow: 1;
}

/* 3. Collapsible Sidebar Items */
.sidebar-group {
    margin-bottom: 8px;
}

/* Remove default browser arrows */
summary {
    list-style: none;
    outline: none;
}
summary::-webkit-details-marker {
    display: none;
}

/* Main Clickable Topic Title */
.compact-title {
    padding: 12px 15px;
    cursor: pointer;
    background: #ffffff;
    border: 1px solid var(--border-color);
    border-radius: 6px;
    font-weight: 600;
    transition: all 0.2s;
    border-left: 4px solid transparent;
    display: block;
}

.compact-title:hover {
    background-color: #edf2f7;
}

/* Active/Selected Highlight */
.compact-title.active-link,
details[open] .compact-title {
    background-color: var(--accent-bg);
    color: var(--accent);
    border-left-color: var(--accent);
}

/* Sub-problem Bullet List */
.parts-list {
    margin: 8px 0 15px 35px;
    padding: 0;
    list-style-type: disc;
    color: var(--text-muted);
    font-size: 0.85em;
}

.parts-list li {
    margin-bottom: 5px;
}

/* 4. Main Content Area */
#content {
    flex: 1;
    padding: 40px 60px;
    overflow-y: auto;
    background: white;
}

.puzzle-card {
    border: 1px solid var(--border-color);
    padding: 25px;
    border-radius: 12px;
    margin-bottom: 30px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 15px;
}

h3 {
    margin: 0;
    font-size: 1.3rem;
    color: #1a202c;
}

/* Solution Box Styling */
.answer-link {
    display: inline-block;
    color: var(--accent);
    cursor: pointer;
    font-weight: 600;
    margin-top: 20px;
}

.answer-box {
    background: #f0f7ff;
    padding: 20px;
    margin-top: 15px;
    border-left: 5px solid var(--accent);
    border-radius: 4px;
}

/* 5. Utility Classes */
.hidden {
    display: none !important;
}

.image-div img {
    max-width: 100%;
    border-radius: 8px;
    margin: 15px 0;
}

.math-image {
    display: block;
    max-width: 100%; /* Prevents image from overflowing card */
    height: auto;
    margin: 15px auto; /* Centers the image with spacing */
    border-radius: 8px; /* Matches card aesthetic */
    border: 1px solid #eee; /* Light border to define the image area */
}

/* Hide the answer box by default */
.hidden {
    display: none;
}

.puzzle-card h3 {
    font-weight: bold !important;
    display: block;
    font-size: 1.25rem; /* Adjust as needed */
    margin-bottom: 0.5rem;
}

</style>

</head>

                "answer": "Since $(d') \\perp (P)$, its direction vector is $\\vec{n}_P(2; -1; 1)$. <br> $(d'): \\begin{cases} x = 2m \\\\ y = -m + 1 \\\\ z = m - 1 \\end{cases}$. <br> Substituting into $(P)$: $2(2m) - (-m + 1) + (m - 1) - 4 = 0 \\implies 6m - 6 = 0 \\implies m = 1$. <br> Thus, $H(2; 0; 0)$.",
                "qImg": "",
                "aImg": ""

        "id": "M2",

        "parts": [
            {
                "id": "intro",
                "type": "context",
                "title": "Problem Setup",
                "content": "In the space referred to a direct orthonormal system, consider the point $A(0; 1; -1)$, the plane $(P): x - y + z - 2 = 0$ and the straight line $(d): \\begin{cases} x = t \\\\ y = -t + 1 \\\\ z = -2t - 1 \\end{cases} \\quad ; \\quad t \\in \\mathbb{R}$.",
                "qImg": ""
            },
            {
                "id": "1",
                "type": "question",
                "title": "Relative Position of (d) and (P)",
                "question": "Prove that $(d)$ is strictly parallel to $(P)$.",
                "answer": "$\\vec{V} \\cdot \\vec{n} = (1)(1) + (-1)(-1) + (-2)(1) = 1 + 1 - 2 = 0$. <br> $A(0; 1; -1) \\in (d)$: $0=t, 1=-t+1, -1=-2t-1$. All yield $t=0$, so $A \\in (d)$ <br> $A \\notin (P)$: $0 - 1 + (-1) - 2 = -4 \\neq 0$, so $A \\notin (P)$ <br> Thus, $(d)$ is strictly parallel to $(P)$.",
                "qImg": "",
                "aImg": ""
            },
            {
                "id": "2",
                "type": "question",
                "title": "Orthogonal Projection",
                "question": "Calculate the coordinates of point $H$, the orthogonal projection of $A$ on $(P)$.",
                "answer": "The line $(AH)$ passes through $A$ and has direction vector $\\vec{n}(1; -1; 1)$. <br> $(AH): \\begin{cases} x = m \\\\ y = -m + 1 \\\\ z = m - 1 \\end{cases}$. <br> Intersection with $(P)$: $m - (-m + 1) + (m - 1) - 2 = 0 \\implies 3m - 4 = 0 \\implies m = \\frac{4}{3}$. <br> Substituting $m$: $H\\left(\\frac{4}{3}; -\\frac{1}{3}; \\frac{1}{3}\\right)$.",
                "qImg": "",
                "aImg": ""
            },

    {
        "id": "M3",
        "mainTitle": "Lines and Planes",
        "parts": [
            {
                "id": "intro",
                "type": "context",
                "title": "Problem Setup",
                "content": "In the space referred to a direct orthonormal system, consider the point $A(1; -1; 2)$ and the plane <br> $(P): x + 2y - z - 1 = 0$.",
                "qImg": ""
            },
            {
                "id": "1a",
                "type": "question",
                "title": "Point and Plane",
                "question": "Verify that $A$ does not belong to $(P)$.",
                "answer": "Substitute the coordinates of $A(1; -1; 2)$ into the equation of $(P)$: <br> $x_A + 2y_A - z_A - 1 = 1 + 2(-1) - 2 - 1 = 1 - 2 - 2 - 1 = -4$. <br> Since $-4 \\neq 0$, then $A \\notin (P)$.",
                "qImg": "",
                "aImg": ""
            },
            {
                "id": "1b",
                "type": "question",
                "title": "Parallel Plane through A",
                "question": "Write the equation of plane $(Q)$ passing through $A$ and parallel to $(P)$.",
                "answer": "Since $(Q) \\parallel (P)$, they share the same normal vector $\\vec{n}(1; 2; -1)$. The equation of $(Q)$ is $x + 2y - z + r = 0$. <br> Since $A(1; -1; 2) \\in (Q)$: <br> $1 + 2(-1) - 2 + r = 0 \\implies -3 + r = 0 \\implies r = 3$. <br> Thus, $(Q): x + 2y - z + 3 = 0$.",
                "qImg": "",
                "aImg": ""
            },
            {
                "id": "2",
                "type": "question",
                "title": "Equidistant Plane",
                "question": "Write the equation of plane $(R)$ equidistant from $(P)$ and $(Q)$.",
                "answer": "Plane $(R)$ must be parallel to $(P)$, so $(R): x + 2y - z + r' = 0$. <br> The distance between parallel planes $(P)$ and $(Q)$ is $d(P, Q) = \\frac{|x_A + 2y_A - z_A - 1|}{\\sqrt{1^2 + 2^2 + (-1)^2}} = \\frac{|-4|}{\\sqrt{6}} = \\frac{4}{\\sqrt{6}}$. <br> Let $B(1; 1; 2)$ be a point in $(P)$. The distance $d(B, R) = \\frac{|1 + 2(1) - 2 + r'|}{\\sqrt{6}} = \\frac{|r' + 1|}{\\sqrt{6}}$. <br> Setting distances equal: $|r' + 1| = 4 \\implies r' + 1 = 4$ or $r' + 1 = -4$. <br> This gives $r' = 3$ (which is plane $Q$) or $r' = -5$. <br> Hence, the other plane is $(R'): x + 2y - z - 5 = 0$.",
                "qImg": "",
                "aImg": ""
            }
        ]
    },

        "mainTitle": "Lines and Planes",
        "parts": [
            {
                "id": "intro",
                "type": "context",
                "title": "Problem Setup",
                "content": "In the space referred to a direct orthonormal system $(O; \\vec{i}, \\vec{j}, \\vec{k})$, consider the plane $(P): x - y + z - 1 = 0$ and the plane $(Q): 4x + 2y + z - 1 = 0$.",
                "qImg": ""
            },
            {
                "id": "1",
                "type": "question",
                "title": "Intersection of (P) and (Q)",
                "question": "Prove that $(P)$ and $(Q)$ intersect.",
                "answer": "The normal vectors are $\\vec{n}_P(1; -1; 1)$ and $\\vec{n}_Q(4; 2; 1)$. Since $\\frac{1}{4} \\neq \\frac{-1}{2}$, the vectors are not collinear, so the planes intersect.",
                "qImg": "",
                "aImg": ""
            },
            {
                "id": "2",
                "type": "question",
                "title": "Line of Intersection of (P) and (Q)",
                "question": "Prove that $(P)$ and $(Q)$ intersect at the straight line $(d): \\begin{cases} x = t \\\\ y = -t \\\\ z = -2t + 1 \\end{cases} ; \\thinspace t \\in \\mathbb{R}$",
                "answer": "Substitute $(d)$ into $(P)$: $t - (-t) + (-2t + 1) - 1 = 2t - 2t = 0$. Thus $(d) \\subset (P)$. <br> Substitute $(d)$ into $(Q)$: $4(t) + 2(-t) + (-2t + 1) - 1 = 4t - 4t = 0$. Thus $(d) \\subset (Q)$. <br> Therefore, $(d) = (P) \\cap (Q)$.",
                "qImg": "",
                "aImg": ""
            },
            {
                "id": "3",
                "type": "question",
                "title": "Symmetric Point",
                "question": "Let $A(0; 1; 2) \\in (P)$. Calculate the coordinates of $A'$, the symmetric of $A$ with respect to plane $(Q)$.",
                "answer": "Let $(AA')$ be the line through $A$ perpendicular to $(Q)$ with direction $\\vec{n}_Q(4; 2; 1)$: $(AA'): \\begin{cases} x = 4m \\\\ y = 2m + 1 \\\\ z = m + 2 \\end{cases}$. <br> Find intersection $H = (AA') \\cap (Q)$: $4(4m) + 2(2m + 1) + (m + 2) - 1 = 0 \\implies 21m + 3 = 0 \\implies m = -\\frac{1}{7}$. <br> $H$ is $(\\frac{-4}{7}; \\frac{5}{7}; \\frac{13}{7})$. <br> Using $H$ as midpoint of $[AA']$: $x_{A'} = 2x_H - x_A = -\\frac{8}{7}$, $y_{A'} = 2y_H - y_A = \\frac{3}{7}$, $z_{A'} = 2z_H - z_A = \\frac{12}{7}$. <br> Thus, $A'(-\\frac{8}{7}; \\frac{3}{7}; \\frac{12}{7})$.",
                "qImg": "",
                "aImg": ""
            },

    {
        "id": "M5",
        "mainTitle": "Lines and Planes",
        "parts": [
            {
                "id": "intro",
                "type": "context",
                "title": "Problem Setup",
                "content": "In the space referred to a direct orthonormal system $(O; \\vec{i}, \\vec{j}, \\vec{k})$, consider the point $A(1; 0; -1)$ and the straight line <d> $(d): \\begin{cases} x = 2\\lambda - 1 \\\\ y = -\\lambda \\\\ z = -\\lambda + 2 \\end{cases} \\quad ; \\lambda \\in \\mathbb{R}$.",
                "qImg": ""
            },
            {
                "id": "1a",
                "type": "question",
                "title": "Point and Line Verification",
                "question": "Verify that $A$ does not belong to $(d)$.",
                "answer": "For $A(1, 0, -1)$ to be on $(d)$, there must exist a single $\\lambda$ such that: <br> $1 = 2\\lambda - 1 \\implies \\lambda = 1$ <br> $0 = -\\lambda \\implies \\lambda = 0$ <br> Since these values are contradictory, $A \\notin (d)$.",
                "qImg": "",
                "aImg": ""
            },
            {
                "id": "1b",
                "type": "question",
                "title": "Equation of Plane (P)",
                "question": "Write the equation of plane $(P)$ containing $A$ and $(d)$.",
                "answer": "Let $B(-1; 0; 2)$ be a point on $(d)$ and $\\vec{V}(2; -1; -1)$ its direction vector. <br> The normal vector $\\vec{n} = \\vec{V} \\times \\overrightarrow{AB}$. With $\\overrightarrow{AB}(-2; 0; 3)$, the cross product gives $\\vec{n}(-3; -4; -2)$. <br> Using $A(1; 0; -1)$, the equation is $-3(x - 1) - 4(y - 0) - 2(z + 1) = 0$, which simplifies to: <br> $(P): 3x + 4y + 2z - 1 = 0$.",
                "qImg": "",
                "aImg": ""
            },
            {
                "id": "2",
                "type": "question",
                "title": "Orthogonal Projection",
                "question": "Calculate the coordinates of point $H$, the orthogonal projection of $A$ on $(d)$.",
                "answer": "$H \\in (d)$, so $H(2\\lambda - 1; -\\lambda; -\\lambda + 2)$. <br> $\\overrightarrow{AH}(2\\lambda - 2; -\\lambda; -\\lambda + 3)$. Since $\\overrightarrow{AH} \\perp \\vec{V}$, their dot product is zero: <br> $2(2\\lambda - 2) - 1(-\\lambda) - 1(-\\lambda + 3) = 0 \\implies 6\\lambda - 7 = 0 \\implies \\lambda = \\frac{7}{6}$. <br> Substituting $\\lambda$ gives $H(\\frac{4}{3}; -\\frac{7}{6}; \\frac{5}{6})$.",
                "qImg": "",
                "aImg": ""
            },
            {
                "id": "3",
                "type": "question",
                "title": "Equation of Plane (Q)",
                "question": "Write the equation of plane $(Q)$ containing $(d)$ and perpendicular to $(P)$.",
                "answer": "The normal $\\vec{n}_Q = \\vec{V}_d \\times \\vec{n}_P$. <br> $\\vec{n}_Q = (2; -1; -1) \\times (3; 4; 2) = (2; -7; 11)$. <br> Since $B(-1; 0; 2) \\in (Q)$, the equation is $2(x + 1) - 7(y - 0) + 11(z - 2) = 0$. <br> $(Q): 2x - 7y + 11z - 20 = 0$.",
                "qImg": "",
                "aImg": ""
            },
            {
                "id": "4",
                "type": "question",
                "title": "Distance from Point to Line",
                "question": "Find the distance from $A$ to $(d)$.",
                "answer": "The distance $d(A, (d)) = AH = \\sqrt{(x_H - x_A)^2 + (y_H - y_A)^2 + (z_H - z_A)^2}$. <br> Alternatively, using the formula $d = \\frac{\\|\\vec{AB} \\times \\vec{V}_d\\|}{\\|\\vec{V}_d\\|} = \\frac{\\|\\vec{n}_P\\|}{\\|\\vec{V}_d\\|} = \\frac{\\sqrt{9+16+4}}{\\sqrt{4+1+1}} = \\frac{\\sqrt{29}}{\\sqrt{6}}$. <br> Distance $\\approx 2.199$ units.",
                "qImg": "",
                "aImg": ""
            }
        ]
    },
    {
        "id": "M6",
        "mainTitle": "Lines and Planes",
        "parts": [
            {
                "id": "intro",
                "type": "context",
                "title": "Problem Setup",
                "content": "Consider in an orthonormal system $(O; \\vec{i}, \\vec{j}, \\vec{k})$ the plane $(P): x + y - z - 1 = 0$, the line $(d): \\begin{cases} x = -t - 1 \\\\ y = t + 5 \\\\ z = 3t + 9 \\end{cases}$ where $t$ is a real parameter, the point $E(2; 2; 0)$ and the point $H$, the orthogonal projection of $E$ on $(P)$.",
                "qImg": ""
            },
            {
                "id": "1",
                "type": "question",
                "title": "Point and Intersection",
                "question": "Prove that $E$ is a point on $(d)$ and then determine the coordinates of $A$, the point of intersection between $(d)$ and $(P)$.",
                "answer": "Substitute coordinates of $E$ into $(d)$: $2 = -t - 1 \\implies t = -3$, $2 = -3 + 5$, $0 = 3(-3) + 9$. Since $t = -3$ satisfies all, $E \\in (d)$. <br> For $A$: substitute $(d)$ into $(P)$: $(-t - 1) + (t + 5) - (3t + 9) - 1 = 0 \\implies -3t - 6 = 0 \\implies t = -2$. <br> Thus, $A(1; 3; 3)$.",
                "qImg": "",
                "aImg": ""
            },
            {
                "id": "2",
                "type": "question",
                "title": "Equation of Plane (Q)",
                "question": "Determine an equation of the plane $(Q)$ that contains $(d)$ and is perpendicular to $(P)$.",
                "answer": "$\\vec{n}_P(1; 1; -1)$ and $\\vec{V}(-1; 1; 3)$. A normal to $(Q)$ is $\\vec{n}_Q = \\vec{V} \\times \\vec{n}_P = (-4; 2; -2)$. <br> Using $E(2; 2; 0)$: $-4(x-2) + 2(y-2) - 2(z-0) = 0 \\implies -4x + 8 + 2y - 4 - 2z = 0$. <br> Simplifies to $(Q): 2x - y + z - 2 = 0$.",
                "qImg": "",
                "aImg": ""
            },
            {
                "id": "3",
                "type": "question",
                "title": "Line (AH) and Point H",
                "question": "Deduce a system of parametric equations of the line $(AH)$ and prove that $H(1; 1; 1)$.",
                "answer": "Line $(AH)$ is the intersection of $(P)$ and $(Q)$. Setting $z = m$ and solving the system gives $(AH): \\begin{cases} x = 1 \\\\ y = m \\\\ z = m \\end{cases}$ where $m$ is a real number. <br> Since $H \\in (AH)$ and $\\overrightarrow{EH} \\perp \\vec{V}$, the dot product $(-1; m-2; m) \\cdot (0; 1; 1) = 0 \\implies 2m - 2 = 0 \\implies m = 1$. <br> Thus, $H(1; 1; 1)$.",
                "qImg": "",
                "aImg": ""
            },
            {
                "id": "4",
                "type": "question",
                "title": "Angle Calculation",
                "question": "Calculate, to the nearest degree, the angle that the line $(d)$ makes with plane $(P)$.",
                "answer": "The angle $\\theta$ is $\\widehat{EAH}$. <br> $\\overrightarrow{AE}(1; -1; -3)$ and $\\overrightarrow{AH}(0; -2; -2)$. <br> $\\cos(\\widehat{EAH}) = \\frac{\\overrightarrow{AE} \\cdot \\overrightarrow{AH}}{\\|\\overrightarrow{AE}\\| \\times \\|\\overrightarrow{AH}\\|} = \\frac{8}{\\sqrt{11} \\times \\sqrt{8}} = \\sqrt{\\frac{8}{11}}$. <br> $\\widehat{EAH} \\approx 31^{\\circ}$.",
                "qImg": "",
                "aImg": ""
            },
            {
                "id": "5",
                "type": "question",
                "title": "Maximum Distance",
                "question": "Let $(C)$ be the circle in $(Q)$ of center $E$ and tangent to $(AH)$ at $H$. Calculate the maximum distance between $A$ and any point $M$ on $(C)$.",

    {
        "id": "M7",
        "mainTitle": "Lines and Planes",
        "parts": [
            {
                "id": "intro",
                "type": "context",
                "title": "Problem Setup",
                "content": "In the space referred to a direct orthonormal system $(O; \\vec{i}, \\vec{j}, \\vec{k})$, consider the point $A(1; 2; 0)$ and the two straight lines $(d): \\begin{cases} x = t + 1 \\\\ y = -t + 2 \\\\ z = t \\end{cases}$ and $(d'): \\begin{cases} x = -m + 2 \\\\ y = m + 1 \\\\ z = m - 1 \\end{cases}$ ,  where $m$ and $t$ are real parameters.",
                "qImg": ""
            },
            {
                "id": "1",
                "type": "question",
                "title": "Intersection of Lines",
                "question": "Show that the two straight lines $(d)$ and $(d')$ intersect at the point $A$.",
                "answer": "For $(d)$: setting $t = 0$ gives $x = 1, y = 2, z = 0$, so $A \\in (d)$. <br> For $(d')$: setting $m = 1$ gives $x = -1 + 2 = 1, y = 1 + 1 = 2, z = 1 - 1 = 0$, so $A \\in (d')$. <br> Thus, $(d)$ and $(d')$ intersect at point $A$.",
                "qImg": "",
                "aImg": ""
            },
            {
                "id": "2",
                "type": "question",
                "title": "Equation of Plane (P)",
                "question": "Write the equation of the plane $(P)$ determined by $(d)$ and $(d')$.",
                "answer": "The direction vectors are $\\vec{V}_d(1; -1; 1)$ and $\\vec{V}_{d'}(-1; 1; 1)$. <br> The normal vector $\\vec{n}_P = \\vec{V}_d \\times \\vec{V}_{d'} = (-2; -2; 0)$. <br> Using $A(1; 2; 0)$, the equation is $-2(x - 1) - 2(y - 2) + 0(z - 0) = 0$, which simplifies to: <br> $(P): x + y - 3 = 0$.",
                "qImg": "",
                "aImg": ""
            },
            {
                "id": "3",
                "type": "question",
                "title": "Bisector Analysis",
                "question": "Consider the line $(D): \\begin{cases} x = 1 \\\\ y = 2 \\\\ z = 2k \\end{cases}$ , where $k$ is a real number. <br> Show that $(D)$ lies in $(P)$ and is the bisector of the angle formed between $(d)$ and $(d')$.",
                "answer": "Substituting $(D)$ into $(P)$: $1 + 2 - 3 = 0$. Since it is satisfied for all $k$, $(D) \\subset (P)$. <br>$\\vec{V}_D(0; 0; 2)$. Note that $\\vec{V}_d + \\vec{V}_{d'} = (0; 0; 2) = \\vec{V}_D$. Since $(D)$ passes through the intersection point $A$ (at $k=0$) and its direction vector is the sum of the unit-length-equivalent direction vectors of $(d)$ and $(d')$, it is the interior bisector.",
                "qImg": "",
                "aImg": ""
            },
            {
                "id": "4",
                "type": "question",
                "title": "Circle and Tangency",
                "question": "Consider the point $F(1; 2; 4)$ on $(D)$ and the circle $(C)$ in $(P)$ with center $F$ and radius $r = \\frac{4\\sqrt{6}}{3}$. <br> Show $(C)$ is tangent to $(d)$ and $(d')$ and calculate $EA$ where $E$ is the tangency point on $(d)$.",
                "answer": "The distance $d(F, (d)) = \\frac{\\|\\vec{V}_d \\times \\overrightarrow{FA}\\|}{\\|\\vec{V}_d\\|}$. With $\\overrightarrow{FA}(0; 0; -4)$, $\\vec{V}_d \\times \\overrightarrow{FA} = (4; 4; 0)$. <br> Distance $= \\frac{\\sqrt{16+16}}{\\sqrt{1+1+1}} = \\frac{\\sqrt{32}}{\\sqrt{3}} = \\frac{4\\sqrt{2}}{\\sqrt{3}} = \\frac{4\\sqrt{6}}{3} = r$. Thus, $(C)$ is tangent to $(d)$. By symmetry, it is also tangent to $(d')$. <br>In the right triangle $AEF$ (right at $E$): $AF^2 = AE^2 + EF^2$. <br> $4^2 = AE^2 + (\\frac{4\\sqrt{6}}{3})^2 \\implies 16 = AE^2 + \\frac{96}{9} \\implies AE^2 = 16 - \\frac{32}{3} = \\frac{16}{3}$. <br> $EA = \\sqrt{\\frac{16}{3}} = \\frac{4\\sqrt{3}}{3}$.",

        {
        "id": "M9",
        "mainTitle": "Lines and Planes",
        "parts": [
            {
                "id": "Aintro",
                "type": "context",
                "title": "Problem Setup",
                "content": "The space is referred to a direct orthonormal system $(O; \\vec{i}, \\vec{j}, \\vec{k})$. Consider the points $A(1; 1; -1)$, $B(-1; 0; 1)$ and the straight line $(D)$ defined by the system: $\\begin{cases} x = t - 1 \\\\ y = -t \\\\ z = -4t + 10 \\end{cases}$ where $t$ is a real parameter.",
                "qImg": ""
            },
            {
                "id": "1",
                "type": "question",
                "title": "Parametric equations of (AB)",
                "question": "Determine a system of parametric equations of the line $(AB)$.",
                "answer": "Using point $A(1; 1; -1)$ and the direction vector $\\overrightarrow{AB}(-2; -1; 2)$, the system is: $\\begin{cases} x = -2m + 1 \\\\ y = -m + 1 \\\\ z = 2m - 1 \\end{cases}$ where $m$ is a real number.",
                "qImg": "",
                "aImg": ""
            },
            {
                "id": "2",
                "type": "question",
                "title": "Coplanarity",
                "question": "Prove that $(D)$ and $(AB)$ are not coplanar.",
                "answer": "To prove that $(D)$ and $(AB)$ are not coplanar, we show they are neither parallel nor intersecting.<br><br><b>Method 1: Intersection and Collinearity Check</b><br>1. <b>Collinearity:</b> Direction vector of $(AB)$ is $\\vec{u}(-2; -1; 2)$ and direction vector of $(D)$ is $\\vec{v}(1; -1; -4)$. Since the ratios $\\cfrac{-2}{1} \\neq \\cfrac{-1}{-1} \\neq \\cfrac{2}{-4}$, the vectors are not collinear, so the lines are not parallel.<br>2. <b>Intersection:</b> Set the parametric equations equal:<br>$(AB): x = -2m+1, y = -m+1, z = 2m-1$<br>$(D): x = t-1, y = -t, z = -4t+10$<br>From $x$ and $y$: $-2m+1 = t-1$ and $-m+1 = -t$. Solving gives $m = 1$ and $t = 0$.<br>Check $z$: For $(AB)$, $z = 2(1)-1 = 1$. For $(D)$, $z = -4(0)+10 = 10$. Since $1 \\neq 10$, the lines do not intersect.<br><br><b>Method 2: Determinant (Mixed Product)</b><br>Let $A(1; 1; -1)$ be on $(AB)$ and $M(-1; 0; 10)$ be on $(D)$ (at $t=0$).<br>Calculate the determinant of $(\\overrightarrow{AM}, \\vec{u}, \\vec{v})$ where $\\overrightarrow{AM}(-2; -1; 11)$:<br>$\\text{Det} = \\begin{vmatrix} -2 & -1 & 11 \\\\ -2 & -1 & 2 \\\\ 1 & -1 & -4 \\end{vmatrix}$<br>Expansion: $-2(4+2) - (-1)(8-2) + 11(2+1) = -12 + 6 + 33 = 27$.<br>Since $\\text{Det} \\neq 0$, the lines are skew and thus not coplanar.",
                "qImg": "",
                "aImg": ""
            },
            {
                "id": "3a",
                "type": "question",
                "title": "Normal vector to (P)",
                "question": "Let $(P)$ be the plane containing $(AB)$ and parallel to $(D)$. Prove that the vector $\\vec{V}(2; -2; 1)$ is a normal vector to $(P)$.",
                "answer": "Check that $\\vec{V}$ is orthogonal to both line direction vectors: $\\vec{V} \\cdot \\overrightarrow{AB} = (2)(-2) + (-2)(-1) + (1)(2) = -4 + 2 + 2 = 0$ and $\\vec{V} \\cdot \\vec{V_D} = (2)(1) + (-2)(-1) + (1)(-4) = 2 + 2 - 4 = 0$.",
                "qImg": "",
                "aImg": ""
            },
            {
                "id": "3b",
                "type": "question",
                "title": "Equation of Plane (P)",
                "question": "Write an equation of $(P)$.",
                "answer": "Using normal vector $\\vec{V}(2; -2; 1)$ and point $A(1; 1; -1)$: $2(x - 1) - 2(y - 1) + 1(z + 1) = 0 <br>That is, 2x - 2y + z + 1 = 0$.",
                "qImg": "",

                "title": "Distance from (D) to (P)",
                "question": "Let $M$ be a variable point of $(D)$. Prove that the distance from $(D)$ to the plane $(P)$ is equal to 3 units of length.",
                "answer": "$M(t - 1; -t; -4t + 10)$. <br>$d(M, P) = \\cfrac{|2x_M - 2y_M + z_M + 1|}{\\sqrt{2^2 + (-2)^2 + 1^2}} = \\cfrac{|2t - 2 + 2t - 4t + 10 + 1|}{\\sqrt{9}}$<br>Simplify: <br>$d(M, P) = \\cfrac{|(2t + 2t - 4t) + (-2 + 10 + 1)|}{3} = \\cfrac{|0t + 9|}{3} = \\cfrac{9}{3} = 3$.<br><br>Conclusion:</b> Since the variable $t$ cancels out, the distance is independent of the position of $M$ on $(D)$. Thus, the distance from line $(D)$ to plane $(P)$ is a constant *3 units of length*.",

                "question": "Determine the two points, situated at a distance 9 from $(P)$, whose orthogonal projection on $(P)$ is $A$.",
                 "answer": "Let $E(x; y; z)$ be a point at a distance 9 from $(P)$. Since $A(1; 1; -1)$ is the orthogonal projection of $E$ on $(P)$, the vector $\\overrightarrow{AE}$ must be collinear with the normal vector $\\vec{V}(2; -2; 1)$ of the plane $(P)$.<br><br>$\\|\\vec{V}\\| = \\sqrt{4 + 4 + 1} = 3$.<br>Since $\\overrightarrow{AE}$ is collinear with $\\vec{V}$, we can write $\\overrightarrow{AE} = k\\vec{V}$. <br>The magnitude is $\\|\\overrightarrow{AE}\\| = 3|k|$.<br>Setting the distance to 9: $3|k| = 9 \\implies |k| = 3$. Therefore, $k = 3$ or $k = -3$.<br>Substituting $k = 3$ we get $\\overrightarrow{AE} = (6; -6; 3)$, then $x = 7$, $y = -5$ and $z = 2$, so we get the first point $E = (7; -5; 2)$. <br>Substituting $k = -3$ we get $\\overrightarrow{AE} = (-6; 6; -3)$ so we get the second point name it $F = (-5; 7; -4)$.<br>.",

function init() {
    const nav = document.getElementById('nav-list');
    nav.innerHTML = '';
    const scrollTarget = document.getElementById('content'); // Get the scrollable div

    courseData.forEach((topic, tIdx) => {
        const details = document.createElement('details');
        details.className = 'sidebar-group';

        const summary = document.createElement('summary');
        summary.className = 'compact-title';
        summary.innerHTML = `${tIdx + 1}. ${topic.mainTitle}`;

        // 1. INITIAL STATE (Runs once per refresh for the first item)
        if (tIdx === 0) {
            summary.classList.add('active-link');
            details.open = true;
            displayTopic(tIdx);

            // Fix: Scroll to top on page load
            if (scrollTarget) scrollTarget.scrollTop = 0;
        }

        // 2. CLICK LOGIC
        summary.onclick = (e) => {
            document.querySelectorAll('.compact-title').forEach(el => el.classList.remove('active-link'));
            document.querySelectorAll('.sidebar-group').forEach(det => {
                if (det !== details) det.open = false;
            });

            summary.classList.add('active-link');
            displayTopic(tIdx);

            // Fix: Scroll to top when clicking a new problem
            if (scrollTarget) {
                scrollTarget.scrollTo({ top: 0, behavior: 'smooth' });
            }
        };

        const ul = document.createElement('ul');
        ul.className = 'parts-list';
        topic.parts.forEach(p => {
            const li = document.createElement('li');
            li.innerText = p.title.replace(/^Part\s[A-Z]:\s/i, "");
            ul.appendChild(li);
        });

        details.appendChild(summary);
        details.appendChild(ul);
        nav.appendChild(details);
    });
    document.getElementById('count-display').innerText = courseData.length;
}


function displayTopic(index) {
    const container = document.getElementById('problem-container');
    container.innerHTML = '';
    const topic = courseData[index];
    const section = document.createElement('div');
    section.className = 'topic-section';

    // Helper to generate Image HTML if a string exists
    const getImageHTML = (imgData) => {
        if (!imgData || imgData.trim() === "") return "";

        // Add prefix if user forgot to include it in the JSON string
        const src = imgData.startsWith('data:image')
                    ? imgData
                    : `data:image/png;base64,${imgData}`;

        return `<img src="${src}" class="math-image" alt="Problem Illustration">`;
    };

    topic.parts.forEach(p => {
        const card = document.createElement('div');
        card.className = 'puzzle-card';

        if (p.type === "context") {
            card.innerHTML = `
                <div class="header"><h3>${p.title}</h3></div>
                <div class="question-body">${p.content}</div>
                ${getImageHTML(p.qImg)}
            `;
        } else {
            card.innerHTML = `
                <div class="header"><h3>${p.id}. ${p.title}</h3></div>
                <div class="question-body">${p.question}</div>
                ${getImageHTML(p.qImg)}

                <div class="answer-link" onclick="toggleAns('${p.id}')">View Solution ▼</div>

                <div id="ans-box-${p.id}" class="answer-box hidden">
                    <div>${p.answer}</div>
                    ${getImageHTML(p.aImg)}
                </div>
            `;
        }
        section.appendChild(card);
    });

    container.appendChild(section);

    // Re-run KaTeX if present
    if (window.renderMathInElement) {
        renderMathInElement(container, {
            delimiters: [
                {left: '$$', right: '$$', display: true},
                {left: '$', right: '$', display: false}
            ],
            throwOnError: false
        });
    }
}






function filterContent() {
        const query = document.getElementById('search-box').value.toLowerCase();
        const sidebarGroups = document.querySelectorAll('.sidebar-group');
        let visibleCount = 0;

        courseData.forEach((topic, index) => {
                const sidebar = sidebarGroups[index];
                const match = topic.mainTitle.toLowerCase().includes(query) ||
                                            topic.parts.some(p => p.title.toLowerCase().includes(query));

                if (match) {
                        sidebar.classList.remove('hidden');
                        visibleCount++;
                } else {
                        sidebar.classList.add('hidden');
                }
        });

        document.getElementById('count-display').innerText = visibleCount;
}






function toggleAns(id) {
    const box = document.getElementById(`ans-box-${id}`);
    if (box) {
        box.classList.toggle('hidden');
    }
}


window.onload = init;
</script>
