    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"
        onload="renderMathInElement(document.body, {
            delimiters: [
                {left: '$$', right: '$$', display: true},
                {left: '$', right: '$', display: false},
                {left: '\\(', right: '\\)', display: false},
                {left: '\\[', right: '\\]', display: true}
            ],
            throwOnError: false
        });">
        </script>

 <style>
/* 1. Global Variables & Base Setup */
:root {
    --accent: #2563eb;       /* Primary Blue */
    --accent-bg: #e7f3ff;    /* Light Blue for active states */
    --star-color: #f59e0b;   /* Gold for ratings */
    --bg-sidebar: #f8f9fa;   /* Light gray sidebar */
    --border-color: #e0e0e0;
    --text-main: #333;
    --text-muted: #64748b;
}

body {
    display: flex;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    margin: 0;
    height: 100vh;
    color: var(--text-main);
    overflow: hidden; /* Prevents double scrollbars */
}

/* 2. Sidebar & Search Layout */
#sidebar {
    width: 300px;
    border-right: 1px solid var(--border-color);
    padding: 20px;
    display: flex;
    flex-direction: column;
    background: var(--bg-sidebar);
    box-sizing: border-box;
}

#search-box {
    width: 100%;
    padding: 12px;
    margin-bottom: 20px;
    border: 2px solid var(--border-color);
    border-radius: 8px;
    font-size: 1rem;
    outline: none;
    transition: border-color 0.2s;
    box-sizing: border-box;
}

#search-box:focus {
    border-color: var(--accent);
}

#nav-list {
    overflow-y: auto;
    flex-grow: 1;
}

/* 3. Collapsible Sidebar Items */
.sidebar-group {
    margin-bottom: 8px;
}

/* Remove default browser arrows */
summary {
    list-style: none;
    outline: none;
}
summary::-webkit-details-marker {
    display: none;
}

/* Main Clickable Topic Title */
.compact-title {
    padding: 12px 15px;
    cursor: pointer;
    background: #ffffff;
    border: 1px solid var(--border-color);
    border-radius: 6px;
    font-weight: 600;
    transition: all 0.2s;
    border-left: 4px solid transparent;
    display: block;
}

.compact-title:hover {
    background-color: #edf2f7;
}

/* Active/Selected Highlight */
.compact-title.active-link,
details[open] .compact-title {
    background-color: var(--accent-bg);
    color: var(--accent);
    border-left-color: var(--accent);
}

/* Sub-problem Bullet List */
.parts-list {
    margin: 8px 0 15px 35px;
    padding: 0;
    list-style-type: disc;
    color: var(--text-muted);
    font-size: 0.85em;
}

.parts-list li {
    margin-bottom: 5px;
}

/* 4. Main Content Area */
#content {
    flex: 1;
    padding: 40px 60px;
    overflow-y: auto;
    background: white;
}

.puzzle-card {
    border: 1px solid var(--border-color);
    padding: 25px;
    border-radius: 12px;
    margin-bottom: 30px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 15px;
}

h3 {
    margin: 0;
    font-size: 1.3rem;
    color: #1a202c;
}

/* Solution Box Styling */
.answer-link {
    display: inline-block;
    color: var(--accent);
    cursor: pointer;
    font-weight: 600;
    margin-top: 20px;
}

.answer-box {
    background: #f0f7ff;
    padding: 20px;
    margin-top: 15px;
    border-left: 5px solid var(--accent);
    border-radius: 4px;
}

/* 5. Utility Classes */
.hidden {
    display: none !important;
}

.image-div img {
    max-width: 100%;
    border-radius: 8px;
    margin: 15px 0;
}

.math-image {
    display: block;
    max-width: 100%; /* Prevents image from overflowing card */
    height: auto;
    margin: 15px auto; /* Centers the image with spacing */
    border-radius: 8px; /* Matches card aesthetic */
    border: 1px solid #eee; /* Light border to define the image area */
}

/* Hide the answer box by default */
.hidden {
    display: none;
}

.puzzle-card h3 {
    font-weight: bold !important;
    display: block;
    font-size: 1.25rem; /* Adjust as needed */
    margin-bottom: 0.5rem;
}

</style>

</head>

            "title": "Center of Symmetry",
            "question": "Show that the point $I(3; 1)$ is a center of symmetry of $(C)$.",
            "answer": "To show $I(a; b)$ is a center of symmetry, we must prove $f(2a - x) + f(x) = 2b$ for $a=3$ and $b=1$. <br> 1) Calculate $f(6 - x)$: <br> $f(6 - x) = \\cfrac{(6-x)-2}{(6-x)-3} = \\cfrac{4-x}{3-x} = \\cfrac{x-4}{x-3}$. <br> 2) Add $f(x)$: <br> $f(6-x) + f(x) = \\cfrac{x-4}{x-3} + \\cfrac{x-2}{x-3} = \\cfrac{x-4 + x-2}{x-3} = \\cfrac{2x-6}{x-3}$. <br> 3) Simplify: <br> $\\cfrac{2(x-3)}{x-3} = 2$. <br> Since $2 = 2b$, the point $I(3; 1)$ is the center of symmetry.",

        {
            "id": "8",
            "type": "question",
            "title": "Intersection Points",
            "question": "Consider the straight line $(D)$ of equation $y = x - 2$. <br>Calculate the coordinates of the points of intersection $A$ and $B$ of $(D)$ and $(C)$.",
            "answer": "To find the intersections, we set the functions equal: <br> $\\cfrac{x-2}{x-3} = x-2$. <br> $x-2 = (x-2)(x-3)$. <br> $x-2 = x^2 - 3x - 2x + 6$. <br> $x^2 - 6x + 8 = 0$. <br> $(x-2)(x-4) = 0 \\Rightarrow x_1 = 2, x_2 = 4$. <br> Coordinates: <br> - For $x=2$: $y = 2-2=0 \\Rightarrow \\mathbf{A(2; 0)}$. <br> - For $x=4$: $y = 4-2=2 \\Rightarrow \\mathbf{B(4; 2)}$.",
            "qImg": "",
            "aImg": ""
        },
        {
            "id": "9",
            "type": "question",
            "title": "Tangent Equations",
            "question": "Determine the equations of the tangents to $(C)$ at $A$ and $B$.",
            "answer": "The slope of the tangent is $f'(x)$. <br> - At $A(2, 0)$: $f'(2) = \\cfrac{-1}{(2-3)^2} = -1$. Eq: $y - 0 = -1(x-2) \\Rightarrow \\mathbf{y = -x + 2}$. <br> - At $B(4, 2)$: $f'(4) = \\cfrac{-1}{(4-3)^2} = -1$. Eq: $y - 2 = -1(x-4) \\Rightarrow \\mathbf{y = -x + 6}$.",
            "qImg": "",
            "aImg": ""
        }
      ]

{
    "id": "F2",
    "mainTitle": "Rational Function",
    "parts": [
        {
            "id": "intro",
            "type": "context",
            "title": "Problem Setup",
            "content": "Consider the function $f$ defined over $\\mathbb{R}$ by $f(x) = \\cfrac{2x-1}{x+2}$ and let $(C)$ be its representative curve in an orthonormal system.",
            "qImg": ""
        },
        {
            "id": "1",
            "type": "question",
            "title": "Domain of Definition",
            "question": "Write the domain of definition of $f$ and justify your answer.",
            "answer": "Set $x + 2 \\ne 0 \\Rightarrow x \\ne -2$. <br> Therefore, the domain of definition is $D_f = \\mathbb{R} \\text{-} \\{-2\\}$. <br> In interval notation: $D_f = ]-\\infty, -2[ \\cup ]-2, +\\infty[$.",
            "qImg": "",
            "aImg": ""
        },
        {
            "id": "2",
            "type": "question",
            "title": "Limits and Asymptotes",
            "question": "Determine the limits at infinity and around the vertical asymptote. Deduce the equations of the asymptotes.",
            "answer": "At Infinity: $\\lim\\limits_{x \\to \\pm\\infty} \\cfrac{2x-1}{x+2} = \\lim\\limits_{x \\to \\pm\\infty} \\cfrac{2x}{x} = 2$. <br> Thus, the line $y = 2$ is a horizontal asymptote. <br> 2) At $x = -2$: The numerator approaches $-5$. <br> - $\\lim\\limits_{x \\to (-2)^-} f(x) = \\cfrac{-5}{0^-} = +\\infty$. <br> - $\\lim\\limits_{x \\to (-2)^+} f(x) = \\cfrac{-5}{0^+} = -\\infty$. <br> Thus, the line $x = -2$ is a vertical asymptote.",
            "qImg": "",
            "aImg": ""
        },
        {
            "id": "3",
            "type": "question",
            "title": "Variations of f",

            "question": "Calculate the coordinates of the intersection points $A$ and $B$ of $(C)$ and the line $(D): y = -x + 4$.",

    {
    "id": "F5",
    "mainTitle": "Rational Function",
    "parts": [
        {
            "id": "intro",
            "type": "context",
            "title": "Problem Setup",
            "content": "Consider the function $f$ defined over $]-\\infty, 1[ \\cup ]1, +\\infty[$ by $f(x) = -x + 1 + \\cfrac{4}{x-1}$, and let $(C)$ be its representative curve in an orthonormal system of axes.",
            "qImg": ""
        },
        {
            "id": "1a",
            "type": "question",
            "title": "Limits and Vertical Asymptote",
            "question": "Find the following limits: $\\lim\\limits_{x \\to 1} f(x)$, $\\lim\\limits_{x \\to -\\infty} f(x)$, and $\\lim\\limits_{x \\to +\\infty} f(x)$. Deduce an asymptote to curve $(C)$.",
            "answer": "At infinity: For $x \\to \\pm\\infty$, the term $\\cfrac{4}{x-1}$ goes to 0. Thus, $\\lim\\limits_{x \\to -\\infty} f(x) = +\\infty$ and $\\lim\\limits_{x \\to +\\infty} f(x) = -\\infty$. <br> At $x=1$: The term $\\cfrac{4}{x-1}$ becomes infinite. $\\lim\\limits_{x \\to 1^-} f(x) = -\\infty$ and $\\lim\\limits_{x \\to 1^+} f(x) = +\\infty$. <br> Asymptote: Since the limit at $x=1$ is infinite, the line $x=1$ is a vertical asymptote.",
            "qImg": "",
            "aImg": ""
        },
        {
            "id": "1b",
            "type": "question",
            "title": "Oblique Asymptote Proof",
            "question": "Prove that the straight line $(d): y = -x + 1$ is an oblique asymptote to the curve $(C)$.",
            "answer": "We calculate the difference $f(x) - y_d$: <br> $f(x) - (-x + 1) = (-x + 1 + \\cfrac{4}{x-1}) - (-x + 1) = \\cfrac{4}{x-1}$. <br> Since $\\lim\\limits_{x \\to \\pm\\infty} \\cfrac{4}{x-1} = 0$, the line $(d): y = -x + 1$ is an oblique asymptote.",
            "qImg": "",
            "aImg": ""
        },
        {
            "id": "1c",
            "type": "question",
            "title": "Relative Positions",
            "question": "Discuss, depending on the values of $x$, the relative positions of $(C)$ and $(d)$.",
            "answer": "The position depends on the sign of $f(x) - y_d = \\cfrac{4}{x-1}$. <br> - For $x < 1$: $(x-1)$ is negative, so $\\cfrac{4}{x-1} < 0$. Curve $(C)$ is below $(d)$. <br> - For $x > 1$: $(x-1)$ is positive, so $\\cfrac{4}{x-1} > 0$. Curve $(C)$ is above $(d)$.",
            "qImg": "",
            "aImg": ""
        },
        {
            "id": "2a",
            "type": "question",
            "title": "Derivative Calculation",
            "question": "Show that $f'(x) = \\cfrac{-x^2+2x-5}{(x-1)^2}$.",
            "answer": "Differentiating $f(x) = -x + 1 + 4(x-1)^{-1}$: <br> $f'(x) = -1 + 0 - 4(x-1)^{-2} = -1 - \\cfrac{4}{(x-1)^2}$. <br> Combine over a common denominator: <br> $f'(x) = \\cfrac{-(x-1)^2 - 4}{(x-1)^2} = \\cfrac{-(x^2 - 2x + 1) - 4}{(x-1)^2} = \\cfrac{-x^2 + 2x - 5}{(x-1)^2}$.",
            "qImg": "",
            "aImg": ""
        },
        {

            "id": "intro",
            "type": "context",
            "title": "Problem Setup",
            "content": "Consider the function $f$ defined by $f(x) = \\cfrac{x^2+3x+3}{x+1}$ and let $(C)$ be its representative curve in an orthonormal system $(O; \\vec{i}, \\vec{j})$.",
            "qImg": ""

        {
            "id": "1",
            "type": "question",
            "title": "Domain and Limits",
            "question": "Determine the domain $D_f$, calculate the limits at its open boundaries, and deduce an asymptote to curve $(C)$.",
            "answer": "Domain: The function is defined for $x + 1 \\neq 0$, so $D_f = ]-\\infty, -1[ \\cup ]-1, +\\infty[$. <br> Limits at Infinity: $\\lim\\limits_{x \\to \\pm\\infty} \\cfrac{x^2+3x+3}{x+1} = \\lim\\limits_{x \\to \\pm\\infty} \\cfrac{x^2}{x} = \\pm\\infty$. <br> Limits at $x = -1$: The numerator approaches $1$. <br> - $\\lim\\limits_{x \\to -1^-} f(x) = \\cfrac{1}{0^-} = -\\infty$. <br> - $\\lim\\limits_{x \\to -1^+} f(x) = \\cfrac{1}{0^+} = +\\infty$. <br> Asymptote: Since the limit at $x = -1$ is infinite, the line $x = -1$ is a vertical asymptote.",
            "qImg": "",
            "aImg": ""
        },
        {
            "id": "2",
            "type": "question",
            "title": "Oblique Asymptote",
            "question": "Verify $f(x) = x + 2 + \\cfrac{1}{x+1}$ and show that $(d): y = x + 2$ is an oblique asymptote.",
            "answer": "Verification: $x+2 + \\cfrac{1}{x+1} = \\cfrac{(x+2)(x+1)+1}{x+1} = \\cfrac{x^2+3x+2+1}{x+1} = \\cfrac{x^2+3x+3}{x+1}$. <br> Since $\\lim\\limits_{x \\to \\pm\\infty} [f(x) - (x+2)] = \\lim\\limits_{x \\to \\pm\\infty} \\cfrac{1}{x+1} = 0$, the line $(d): y = x + 2$ is an oblique asymptote. <br>Relative Position: The position depends on the sign of $f(x) - y_d = \\cfrac{1}{x+1}$: <br> - On $]-\\infty; -1[$: $\\cfrac{1}{x+1} < 0$, so $(C)$ is below $(d)$. <br> - On $]-1; +\\infty[$: $\\cfrac{1}{x+1} > 0$, so $(C)$ is above $(d)$.",
            "qImg": "",
            "aImg": ""
        },

            "title": "Problem Setup",
            "content": "Let $f$ be the function defined over $]-\\infty, -\\frac{3}{2}[ \\cup ]-\\frac{3}{2}, +\\infty[$ by $f(x) = \\cfrac{4x^2+4x-2}{2x+3}$ and designate by $(C)$ its curve in an orthonormal system $(O; \\vec{i}, \\vec{j})$.",

            "id": "1",
            "type": "question",
            "title": "Limits and Vertical Asymptote",
            "question": "Calculate the limits of $f$ at the open boundaries of its domain and deduce an asymptote to $(C)$.",
            "answer": "Limits at Infinity: Since $f$ is a rational function, the limit at infinity is the limit of the ratio of the highest degree terms: $\\lim\\limits_{x \\to \\pm\\infty} \\cfrac{4x^2}{2x} = \\lim\\limits_{x \\to \\pm\\infty} 2x = \\pm\\infty$. <br> Limits at $x = -frac{3}{2}$: The numerator approaches $4(9/4) + 4(-\\frac{3}{2}) - 2 = 9 - 6 - 2 = 1$. <br> - As $x \\to (-\\frac{3}{2})^-$, the denominator $(2x+3) \\to 0^-$, so $f(x) \\to -\\infty$. <br> - As $x \\to (-\\frac{3}{2})^+$, the denominator $(2x+3) \\to 0^+$, so $f(x) \\to +\\infty$. <br> 3) Asymptote: Because the limit at $x = -\\frac{3}{2}$ is infinite, the line $x = -\\frac{3}{2}$ is a vertical asymptote to the curve $(C)$.",
            "qImg": "",
            "aImg": ""
        },

function init() {
    const nav = document.getElementById('nav-list');
    nav.innerHTML = '';
    const scrollTarget = document.getElementById('content'); // Get the scrollable div

    courseData.forEach((topic, tIdx) => {
        const details = document.createElement('details');
        details.className = 'sidebar-group';

        const summary = document.createElement('summary');
        summary.className = 'compact-title';
        summary.innerHTML = `${tIdx + 1}. ${topic.mainTitle}`;

        // 1. INITIAL STATE (Runs once per refresh for the first item)
        if (tIdx === 0) {
            summary.classList.add('active-link');
            details.open = true;
            displayTopic(tIdx);

            // Fix: Scroll to top on page load
            if (scrollTarget) scrollTarget.scrollTop = 0;
        }

        // 2. CLICK LOGIC
        summary.onclick = (e) => {
            document.querySelectorAll('.compact-title').forEach(el => el.classList.remove('active-link'));
            document.querySelectorAll('.sidebar-group').forEach(det => {
                if (det !== details) det.open = false;
            });

            summary.classList.add('active-link');
            displayTopic(tIdx);

            // Fix: Scroll to top when clicking a new problem
            if (scrollTarget) {
                scrollTarget.scrollTo({ top: 0, behavior: 'smooth' });
            }
        };

        const ul = document.createElement('ul');
        ul.className = 'parts-list';
        topic.parts.forEach(p => {
            const li = document.createElement('li');
            li.innerText = p.title.replace(/^Part\s[A-Z]:\s/i, "");
            ul.appendChild(li);
        });

        details.appendChild(summary);
        details.appendChild(ul);
        nav.appendChild(details);
    });
    document.getElementById('count-display').innerText = courseData.length;
}


function displayTopic(index) {
    const container = document.getElementById('problem-container');
    container.innerHTML = '';
    const topic = courseData[index];
    const section = document.createElement('div');
    section.className = 'topic-section';

    // Helper to generate Image HTML if a string exists
    const getImageHTML = (imgData) => {
        if (!imgData || imgData.trim() === "") return "";

        // Add prefix if user forgot to include it in the JSON string
        const src = imgData.startsWith('data:image')
                    ? imgData
                    : `data:image/png;base64,${imgData}`;

        return `<img src="${src}" class="math-image" alt="Problem Illustration">`;
    };

    topic.parts.forEach(p => {
        const card = document.createElement('div');
        card.className = 'puzzle-card';

        if (p.type === "context") {
            card.innerHTML = `
                <div class="header"><h3>${p.title}</h3></div>
                <div class="question-body">${p.content}</div>
                ${getImageHTML(p.qImg)}
            `;
        } else {
            card.innerHTML = `
                <div class="header"><h3>${p.id}. ${p.title}</h3></div>
                <div class="question-body">${p.question}</div>
                ${getImageHTML(p.qImg)}

                <div class="answer-link" onclick="toggleAns('${p.id}')">View Solution ▼</div>

                <div id="ans-box-${p.id}" class="answer-box hidden">
                    <div>${p.answer}</div>
                    ${getImageHTML(p.aImg)}
                </div>
            `;
        }
        section.appendChild(card);
    });

    container.appendChild(section);

    // Re-run KaTeX if present
    if (window.renderMathInElement) {
        renderMathInElement(container, {
            delimiters: [
                {left: '$$', right: '$$', display: true},
                {left: '$', right: '$', display: false}
            ],
            throwOnError: false
        });
    }
}


function filterContent() {
        const query = document.getElementById('search-box').value.toLowerCase();
        const sidebarGroups = document.querySelectorAll('.sidebar-group');
        let visibleCount = 0;

        courseData.forEach((topic, index) => {
                const sidebar = sidebarGroups[index];
                const match = topic.mainTitle.toLowerCase().includes(query) ||
                                            topic.parts.some(p => p.title.toLowerCase().includes(query));

                if (match) {
                        sidebar.classList.remove('hidden');
                        visibleCount++;
                } else {
                        sidebar.classList.add('hidden');
                }
        });

        document.getElementById('count-display').innerText = visibleCount;
}


function toggleAns(id) {
    const box = document.getElementById(`ans-box-${id}`);
    if (box) {
        box.classList.toggle('hidden');
    }
}

window.onload = init;
</script>
