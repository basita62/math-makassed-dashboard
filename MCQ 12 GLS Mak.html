<html lang="en">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Mathematics MCQ Quiz</title>

    <!-- KaTeX for Math Rendering -->
    <link rel="stylesheet" href="cdn.jsdelivr.net">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>


 <!-- KaTeX Auto-Render Extension with Custom Delimiter Config -->
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"
        onload="renderMathInElement(document.body, {
            delimiters: [
                {left: '$$', right: '$$', display: true},
                {left: '$', right: '$', display: false},
                {left: '\\(', right: '\\)', display: false},
                {left: '\\[', right: '\\]', display: true}
            ],
            throwOnError: false
        });">
         </script>

 <style>
 :root {
 --primary: #2563eb;
 --primary-hover: #1d4ed8;
 --bg: #f8fafc;
 --card: #ffffff;
 --text: #1e293b;
 --border: #e2e8f0;
 --success: #16a34a;
 --error: #dc2626;
 }
 body {
 font-family: system-ui, -apple-system, sans-serif;
 background-color: var(--bg);
 color: var(--text);
 margin: 0;
 padding: 20px;
 display: flex;
 justify-content: center;
 }
 .container {
 width: 100%;
 max-width: 750px;
 background: var(--card);
 padding: 30px;
 border-radius: 12px;
 box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
 }
 header {
 text-align: center;
 border-bottom: 2px solid var(--border);
 padding-bottom: 20px;
 margin-bottom: 25px;
 }
 .logo {
 width: 60px;
 height: 60px;
 background: var(--primary);
 color: white;
 border-radius: 50%;
 display: flex;
 align-items: center;
 justify-content: center;
 font-weight: bold;
 font-size: 24px;
 margin: 0 auto 10px;
 }
 h1 { margin: 0; font-size: 24px; color: var(--text); }
 .author { font-size: 14px; color: #64748b; margin-top: 5px; }
 .hidden { display: none !important; }
 .form-group { margin-bottom: 20px; }
 label { display: block; font-weight: 600; margin-bottom: 8px; }
 select {
 width: 100%;
 padding: 10px;
 border: 1px solid var(--border);
 border-radius: 6px;
 font-size: 16px;
 background: white;
 }
 .checkbox-group {
 display: flex;
 flex-direction: column;
 gap: 10px;
 background: #f1f5f9;
 padding: 15px;
 border-radius: 6px;
 }
 .checkbox-label {
 display: flex;
 align-items: center;
 gap: 10px;
 cursor: pointer;
 font-size: 16px;
 }
 .btn {
 background-color: var(--primary);
 color: white;
 border: none;
 padding: 12px 24px;
 font-size: 16px;
 font-weight: 600;
 border-radius: 6px;
 cursor: pointer;
 transition: background 0.2s;
 }
 .btn:hover { background-color: var(--primary-hover); }
 .btn-secondary { background-color: #64748b; }
 .btn-secondary:hover { background-color: #475569; }
 .progress-bar {
 height: 6px;
 background: var(--border);
 border-radius: 3px;
 margin-bottom: 20px;
 overflow: hidden;
 }
 .progress-fill {
 height: 100%;
 background: var(--primary);
 width: 0%;
 transition: width 0.3s;
 }
 .question-text { font-size: 19px; font-weight: 500; margin-bottom: 25px; line-height: 1.6; }
 .options-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 25px; }
 .option-item {
 padding: 14px;
 border: 1px solid var(--border);
 border-radius: 6px;
 cursor: pointer;
 transition: all 0.2s;
 font-size: 16px;
 display: flex;
 align-items: center;
 gap: 8px;
 }
 .option-item:hover { background-color: #f1f5f9; border-color: #cbd5e1; }
 .option-item.selected { background-color: #dbeafe; border-color: var(--primary); }
 .nav-btns { display: flex; justify-content: space-between; gap: 10px; }
 .result-card { text-align: center; }
 .score-display { font-size: 48px; font-weight: 800; color: var(--primary); margin: 20px 0; }
 .review-section { margin-top: 30px; text-align: left; border-top: 2px solid var(--border); padding-top: 20px; }
 .review-item { padding: 15px; border-bottom: 1px solid var(--border); margin-bottom: 15px; line-height: 1.5; }
 .status-badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; margin-bottom: 8px; }
 .status-correct { background: #dcfce7; color: var(--success); }
 .status-incorrect { background: #fee2e2; color: var(--error); }
 .status-skipped { background: #f1f5f9; color: #64748b; }
 .explanation { background: #f8fafc; padding: 12px; border-left: 4px solid var(--primary); margin-top: 10px; font-size: 15px; }
 </style>
</head>

<div class="container">
    <header>

  <!-- Header Text -->
  <p class="text-slate-500 font-bold tracking-widest" style="font-size: 1.4rem; letter-spacing: 0.12em; color: #5a6e85; margin: 0 0 16px 0; text-transform: uppercase;">

    Interactive document by Mathematics Department General Coordinator
  </div>

  <!-- Centered Title -->
  <h1 class="flex items-center justify-center font-extrabold text-slate-800" style="font-size: 2.25rem; color: #1e293b; margin: 0; font-weight: 800; letter-spacing: -0.025em;">
    MCQ Quiz Generator
  </h1>

</div>
    </header>

 <!-- SETUP SCREEN -->
 <div id="setup-screen">
 <div class="form-group">
 <label>Select Topics:</label>
 <div class="checkbox-group" id="topics-container">
                <label class="checkbox-label"><input type="checkbox" name="topics" value="Logarithmic Equations" checked> Logarithmic Equations</label>
                <label class="checkbox-label"><input type="checkbox" name="topics" value="Logarithmic Inequalities" checked> Logarithmic Inequalities</label>
                <label class="checkbox-label"><input type="checkbox" name="topics" value="Logarithmic Limits" checked> Logarithmic Limits</label>
                <label class="checkbox-label"><input type="checkbox" name="topics" value="Logarithmic Domain of Definition" checked> Logarithmic Domain of Definition</label>
                <label class="checkbox-label"><input type="checkbox" name="topics" value="Logarithmic Integrals" checked> Logarithmic Integrals</label>
                <label class="checkbox-label"><input type="checkbox" name="topics" value="Simplifying ln and exp expressions" checked> Simplifying ln and exp expressions</label>
                <label class="checkbox-label"><input type="checkbox" name="topics" value="Image of Interval" checked> Image of Interval</label>
                <label class="checkbox-label"><input type="checkbox" name="topics" value="Exponential Equations" checked> Exponential Equations</label>
                <label class="checkbox-label"><input type="checkbox" name="topics" value="Exponential Inequalities" checked> Exponential Inequalities</label>
                <label class="checkbox-label"><input type="checkbox" name="topics" value="Exponential Limits" checked> Exponential Limits</label>
                <label class="checkbox-label"><input type="checkbox" name="topics" value="Exponential Integrals" checked> Exponential Integrals</label>
                <label class="checkbox-label"><input type="checkbox" name="topics" value="Probability" checked> Probability</label>
                <label class="checkbox-label"><input type="checkbox" name="topics" value="Fundamental theorem of calculus" checked> Fundamental Theorem of Calculus</label>
                <label class="checkbox-label"><input type="checkbox" name="topics" value="Counting" checked> Counting</label>
 </div>
 </div>
 <div class="form-group">
 <label for="quiz-size">Number of Questions:</label>
 <select id="quiz-size">
 <option value="3">3 Questions</option>
 <option value="5">5 Questions</option>
 <option value="10">10 Questions</option>
 </select>
 </div>
 <button class="btn" onclick="startQuiz()">Start Quiz</button>
 </div>

 <!-- QUIZ SCREEN -->
 <div id="quiz-screen" class="hidden">
 <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
 <div id="question-meta" style="font-size:14px; color:#64748b; margin-bottom:5px;"></div>
 <div id="question-container" class="question-text"></div>
 <div id="options-container" class="options-list"></div>
 <div class="nav-btns">
 <button class="btn btn-secondary" id="prev-btn" onclick="navigateQuestion(-1)">Back</button>
 <button class="btn btn-secondary" onclick="skipQuestion()">Skip</button>
 <button class="btn" id="next-btn" onclick="navigateQuestion(1)">Next</button>
 </div>
 </div>

 <!-- RESULT SCREEN -->
 <div id="result-screen" class="hidden">
 <div class="result-card">
 <h2>Quiz Completed!</h2>
 <div class="score-display" id="score-text">0/0</div>
 <p id="score-percentage"></p>
 <button class="btn" onclick="restartQuiz()">Try Again</button>
 </div>
 <div id="review-container" class="hidden review-section">
 <h3>Detailed Review</h3>
 <div id="review-list"></div>
 </div>
 </div>
</div>

    const a = 2; const b = Math.random() > 0.5 ? 3 : 5; const c = 1; const d = Math.random() > 0.5 ? 1 : 2;

    const bSign = coeffB >= 0 ? `+ ${coeffB}` : `${coeffB}`;

    return {
        id: id,
        signature: `log_quad_${coeffA}_${coeffB}`,
        topic: "Logarithmic Equations",
        question: `The equation \\( ${coeffA}(\\ln x)^2 ${bSign}\\ln x + ${coeffC} = 0 \\) :`,
        options: { a: "has no solution", b: "has one solution", c: "has two solutions", d: "has infinitely many solutions" },
        correct: "c",
        explanation: `Let \\( u = \\ln x \\). The equation transforms into the quadratic form \\( ${coeffA}u^2 ${bSign}u + ${coeffC} = 0 \\). Factoring yields \\( (${a}u - ${b})(${c}u - ${d}) = 0 \\), giving intermediate roots \\( u = \\frac{${b}}{${a}} \\) and \\( u = ${d} \\). Converting back to logarithmic space using \\( x = e^u \\) results in two valid, real positive solutions.`
    };
});

QuizRegistry["Logarithmic Equations"].push(function(id) {
    // Clean parameter pairings ensuring real roots and valid domain constraints
    const sets = [
        { c: 3, b: 2, validRoots: "1 \\mp \\sqrt{3}" }, // Your exact image question: ln(3+2x-x^2)=0 -> 2+2x-x^2=0 -> x = 1 +/- sqrt(3)
        { c: 5, b: 2, validRoots: "1 \\mp \\sqrt{5}" }, // Variation 1: ln(5+2x-x^2)=0 -> 4+2x-x^2=0 -> x = 1 +/- sqrt(5)
        { c: 4, b: 4, validRoots: "2 \\mp \\sqrt{7}" }  // Variation 2: ln(4+4x-x^2)=0 -> 3+4x-x^2=0 -> x = 2 +/- sqrt(7)
    ];

    const config = sets[Math.floor(Math.random() * sets.length)];

    // Calculate values for mathematical correctness inside the step-by-step breakdown
    const insideConst = config.c - 1;
    const axisValue = config.b / 2;
    const discriminantRoot = insideConst + (axisValue * axisValue);

    return {
        id: id,
        signature: `ln_quadratic_zero_${config.c}_${config.b}`,
        topic: "Logarithmic Equations",
        question: `The solution(s) of the equation \\( \\ln(${config.c} + ${config.b}x - x^2) = 0 \\) is (are):`,
        options: {
            a: `\\( x = ${axisValue} + \\sqrt{${discriminantRoot}} \\)`,
            b: `\\( x = ${axisValue} - \\sqrt{${discriminantRoot}} \\)`,
            c: `\\( x = ${config.validRoots} \\)`,
            d: `\\( x = \\varnothing \\)`
        },
        correct: "c", // Matches option C containing the combined +/- root notation set
        explanation: `1. **Domain Assessment:** The argument must be strictly positive: \\( -x^2 + ${config.b}x + ${config.c} > 0 \\).\n\n2. **Algebraic Solution:** Convert to exponential layout form: \\( ${config.c} + ${config.b}x - x^2 = e^0 \\implies ${config.c} + ${config.b}x - x^2 = 1 \\).\n\n3. **Quadratic Simplification:** Rearrange into standard polynomial layout: \\( x^2 - ${config.b}x - ${insideConst} = 0 \\).\n\nUsing the quadratic formula: \\( x = \\frac{-(-${config.b}) \\pm \\sqrt{(-${config.b})^2 - 4(1)(-${insideConst})}}{2} = ${axisValue} \\pm \\sqrt{${discriminantRoot}} \\).\n\nBoth roots satisfy the baseline real working domain criteria, so the complete solution set includes both variations: \\( x = ${config.validRoots} \\).`
    };
});

QuizRegistry["Logarithmic Equations"].push(function(id) {
    // Generate different random shifting integer constants
    const constants = [3, 5, 7, 9];
    const k = constants[Math.floor(Math.random() * constants.length)];

    return {
        id: id,
        signature: `exp_log_zero_product_${k}`,
        topic: "Logarithmic Equations",
        question: `The number of solutions of the equation \\( (e^x + ${k})(${k} + \\ln x) = 0 \\) is:`,
        options: {
            a: "0",
            b: "1",
            c: "2",
            d: "3"
        },
        correct: "b", // Correct answer is always 1 solution (x = e^-k)
        explanation: `1. **Establish the Domain:** The presence of \\( \\ln x \\) means we must have \\( x > 0 \\).\n\n2. **Analyze the Product Terms:** For a product to equal zero, at least one of its factors must be zero:\n\n- **Factor 1:** \\( e^x + ${k} = 0 \\implies e^x = -${k} \\).\nSince the exponential function \\( e^x \\) is strictly positive for all real numbers (\\( e^x > 0 \\)), it can never equal a negative value. This part yields **no solutions**.\n\n- **Factor 2:** \\( ${k} + \\ln x = 0 \\implies \\ln x = -${k} \\implies x = e^{-${k}} \\).\nSince \\( e^{-${k}} \\) is a very small but strictly positive real number, it completely satisfies our initial domain condition (\\( x > 0 \\)). This part yields exactly **1 valid solution**.\n\n3. **Conclusion:** Combining both factors, the total number of real solutions is exactly **1**.`
    };
});

        options: {
            a: "0",
            b: "1",
            c: "2",
            d: "3"
        },
        correct: "c", // Correct answer is always 2 (roots are x = 1 and x = e^k)
        explanation: `1. **Establish the Domain:** The input variable must satisfy \\( x > 0 \\).\n\n2. **Avoid Division Traps:** Dividing both sides by \\( \\ln x \\) is illegal because it eliminates the possibility that \\( \\ln x = 0 \\). Instead, shift terms to one side to maintain algebraic integrity:\n\\( (\\ln x)^2 - ${k}\\ln x = 0 \\).\n\n3. **Factor the Equation:** Pull out the common factor \\( \\ln x \\):\n\\( \\ln x (\\ln x - ${k}) = 0 \\).\n\n4. **Solve the Components:** This yields two separate potential solution sets:\n- \\( \\ln x = 0 \\implies x = e^0 = 1 \\)\n- \\( \\ln x - ${k} = 0 \\implies \\ln x = ${k} \\implies x = e^{${k}} \\)\n\nBoth \\( x = 1 \\) and \\( x = e^{${k}} \\) are strictly positive real parameters that satisfy the domain. Thus, there are exactly **2** unique solutions.`
    };
});

// =========================================================
// CORE ENGINE NAVIGATION & STATE IMPLEMENTATION
// =========================================================
let quizQuestions = [];
let currentIdx = 0;
let userAnswers = {};
let quizStartTime = null;

function compileMathLayouts(elementId) {
 const target = document.getElementById(elementId);
 if (!target || typeof renderMathInElement !== "function") return;
 let cleanText = target.innerHTML.replace(/&lt;/g, '<').replace(/&gt;/g, '>');
 target.innerHTML = cleanText;
 renderMathInElement(target, {
 delimiters: [
 {left: '$$', right: '$$', display: true},
 {left: '$', right: '$', display: false},
 {left: '\\(', right: '\\)', display: false},
 {left: '\\[', right: '\\]', display: true}
 ],
 throwOnError: false
 });
}

function startQuiz() {
 try {
 const checkboxes = document.querySelectorAll('input[name="topics"]:checked');
 const selectedTopics = Array.from(checkboxes).map(el => el.value);
 if (selectedTopics.length === 0) {
 alert("Please choose at least one mathematics topic configuration.");
 return;
 }
 const requestedSize = parseInt(document.getElementById("quiz-size").value);
 let pool = [];
 let uniqueSignatures = new Set();
 let safetyCounter = 0;
 while (pool.length < requestedSize && safetyCounter < 300) {
 safetyCounter++;
 const topic = selectedTopics[Math.floor(Math.random() * selectedTopics.length)];
 const pluginsList = QuizRegistry[topic];
 if (pluginsList && pluginsList.length > 0) {
 const randomPlugin = pluginsList[Math.floor(Math.random() * pluginsList.length)];
 const generatedQ = randomPlugin("gen_" + Math.random().toString(36).substr(2, 5));
 if (!uniqueSignatures.has(generatedQ.signature)) {
 pool.push(generatedQ);
 uniqueSignatures.add(generatedQ.signature);
 }
 }
 }
 quizQuestions = pool.sort(() => Math.random() - 0.5).slice(0, requestedSize);
 currentIdx = 0;
 userAnswers = {};
 quizStartTime = Date.now();
 document.getElementById("setup-screen").classList.add("hidden");
 document.getElementById("result-screen").classList.add("hidden");
 document.getElementById("quiz-screen").classList.remove("hidden");
 renderQuestion();
 } catch (err) {
 alert("Error during configuration setup: " + err.message);
 }
}
function renderQuestion() {
 try {
 const currentQ = quizQuestions[currentIdx];
 document.getElementById("question-meta").innerText = `Topic: ${currentQ.topic} | Question ${currentIdx + 1} of ${quizQuestions.length}`;
 document.getElementById("question-container").innerHTML = currentQ.question;
 const percent = (currentIdx / quizQuestions.length) * 100;
 document.getElementById("progress-fill").style.width = `${percent}%`;
 document.getElementById("prev-btn").disabled = currentIdx === 0;
 document.getElementById("next-btn").innerText = currentIdx === quizQuestions.length - 1 ? "Finish" : "Next";
 const optionsContainer = document.getElementById("options-container");
 optionsContainer.innerHTML = "";
 Object.keys(currentQ.options).forEach(key => {
 const isSelected = userAnswers[currentQ.id] === key;
 optionsContainer.innerHTML += `
 <div class="option-item ${isSelected ? 'selected' : ''}" onclick="selectOption('${key}')">
 <strong>${key.toUpperCase()}.</strong> &nbsp;<span>${currentQ.options[key]}</span>
 </div>
 `;
 });
 compileMathLayouts("question-container");
 compileMathLayouts("options-container");
 } catch (err) {
 alert("Error drawing active frame contents: " + err.message);
 }
}

function selectOption(key) {
 userAnswers[quizQuestions[currentIdx].id] = key;
 renderQuestion();
}

function skipQuestion() {
 delete userAnswers[quizQuestions[currentIdx].id];
 navigateQuestion(1);
}

function navigateQuestion(direction) {
 if (direction === 1 && currentIdx === quizQuestions.length - 1) {
 completeQuiz();
 return;
 }
 currentIdx += direction;
 renderQuestion();
}
function completeQuiz() {
 document.getElementById("quiz-screen").classList.add("hidden");
 document.getElementById("result-screen").classList.remove("hidden");
 let correctCount = 0;
 const reviewList = document.getElementById("review-list");
 reviewList.innerHTML = "";
 quizQuestions.forEach((q, index) => {
 const userAns = userAnswers[q.id];
 const isCorrect = userAns === q.correct;
 if (isCorrect) correctCount++;
 let statusClass = isCorrect ? "status-correct" : (!userAns ? "status-skipped" : "status-incorrect");
 let statusText = isCorrect ? "Correct" : (!userAns ? "Skipped" : `Incorrect (Selected: ${userAns.toUpperCase()})`);
 reviewList.innerHTML += `
 <div class="review-item">
 <div><strong>Q${index + 1}.</strong> ${q.question}</div>
 <div style="margin: 8px 0;">
 <span class="status-badge ${statusClass}">${statusText}</span>
 <span style="margin-left: 10px; font-size:14px;">Correct Answer: <strong>${q.correct.toUpperCase()}</strong></span>
 </div>
 <div class="explanation"><strong>Explanation:</strong> ${q.explanation}</div>
 </div>
 `;
 });
 document.getElementById("score-text").innerText = `${correctCount} / ${quizQuestions.length}`;
 const percentage = Math.round((correctCount / quizQuestions.length) * 100);
 document.getElementById("score-percentage").innerText = `Score Percentage: ${percentage}%`;

 const totalTimeMs = Date.now() - quizStartTime;
 const minutes = Math.floor(totalTimeMs / 60000);
 const seconds = Math.floor((totalTimeMs % 60000) / 1000);

 let durationEl = document.getElementById("quiz-duration");
 if (!durationEl) {
 document.getElementById("score-percentage").insertAdjacentHTML('afterend', `
 <p id="quiz-duration" style="font-size: 16px; font-weight: 600; color: #64748b; margin: 10px 0;"></p>
 `);
 durationEl = document.getElementById("quiz-duration");
 }
 durationEl.innerText = `Duration Taken: ${minutes}m ${seconds}s`;

 document.getElementById("review-container").classList.add("hidden");
 let actionArea = document.querySelector(".result-card");
 let existingBtn = document.getElementById("toggle-answers-btn");
 if (!existingBtn) {
 actionArea.insertAdjacentHTML('beforeend', `
 <button id="toggle-answers-btn" class="btn btn-secondary" style="margin-top: 15px; margin-left: 10px;" onclick="revealDetailedAnswers()">
 View Detailed Answers
 </button>
 `);
 } else {
 existingBtn.style.display = "inline-block";
 }
}

function revealDetailedAnswers() {
 document.getElementById("review-container").classList.remove("hidden");
 document.getElementById("toggle-answers-btn").style.display = "none";
 compileMathLayouts("review-list");
}

function restartQuiz() {
 document.getElementById("result-screen").classList.add("hidden");
 document.getElementById("setup-screen").classList.remove("hidden");
}
</script>
