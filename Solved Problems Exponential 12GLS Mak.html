 <!-- KaTeX Auto-Render Extension with Custom Delimiter Config -->
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"
        onload="renderMathInElement(document.body, {
            delimiters: [
                {left: '$$', right: '$$', display: true},
                {left: '$', right: '$', display: false},
                {left: '\\(', right: '\\)', display: false},
                {left: '\\[', right: '\\]', display: true}
            ],
            throwOnError: false
        });">
        </script>

 <style>
/* 1. Global Variables & Base Setup */
:root {
    --accent: #2563eb;       /* Primary Blue */
    --accent-bg: #e7f3ff;    /* Light Blue for active states */
    --star-color: #f59e0b;   /* Gold for ratings */
    --bg-sidebar: #f8f9fa;   /* Light gray sidebar */
    --border-color: #e0e0e0;
    --text-main: #333;
    --text-muted: #64748b;
}

body {
    display: flex;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    margin: 0;
    height: 100vh;
    color: var(--text-main);
    overflow: hidden; /* Prevents double scrollbars */
}

/* 2. Sidebar & Search Layout */
#sidebar {
    width: 300px;
    border-right: 1px solid var(--border-color);
    padding: 20px;
    display: flex;
    flex-direction: column;
    background: var(--bg-sidebar);
    box-sizing: border-box;
}

#search-box {
    width: 100%;
    padding: 12px;
    margin-bottom: 20px;
    border: 2px solid var(--border-color);
    border-radius: 8px;
    font-size: 1rem;
    outline: none;
    transition: border-color 0.2s;
    box-sizing: border-box;
}

#search-box:focus {
    border-color: var(--accent);
}

#nav-list {
    overflow-y: auto;
    flex-grow: 1;
}

/* 3. Collapsible Sidebar Items */
.sidebar-group {
    margin-bottom: 8px;
}

/* Remove default browser arrows */
summary {
    list-style: none;
    outline: none;
}
summary::-webkit-details-marker {
    display: none;
}

/* Main Clickable Topic Title */
.compact-title {
    padding: 12px 15px;
    cursor: pointer;
    background: #ffffff;
    border: 1px solid var(--border-color);
    border-radius: 6px;
    font-weight: 600;
    transition: all 0.2s;
    border-left: 4px solid transparent;
    display: block;
}

.compact-title:hover {
    background-color: #edf2f7;
}

/* Active/Selected Highlight */
.compact-title.active-link,
details[open] .compact-title {
    background-color: var(--accent-bg);
    color: var(--accent);
    border-left-color: var(--accent);
}

/* Sub-problem Bullet List */
.parts-list {
    margin: 8px 0 15px 35px;
    padding: 0;
    list-style-type: disc;
    color: var(--text-muted);
    font-size: 0.85em;
}

.parts-list li {
    margin-bottom: 5px;
}

/* 4. Main Content Area */
#content {
    flex: 1;
    padding: 40px 60px;
    overflow-y: auto;
    background: white;
}

.puzzle-card {
    border: 1px solid var(--border-color);
    padding: 25px;
    border-radius: 12px;
    margin-bottom: 30px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 15px;
}

h3 {
    margin: 0;
    font-size: 1.3rem;
    color: #1a202c;
}

/* Solution Box Styling */
.answer-link {
    display: inline-block;
    color: var(--accent);
    cursor: pointer;
    font-weight: 600;
    margin-top: 20px;
}

.answer-box {
    background: #f0f7ff;
    padding: 20px;
    margin-top: 15px;
    border-left: 5px solid var(--accent);
    border-radius: 4px;
}

/* 5. Utility Classes */
.hidden {
    display: none !important;
}

.image-div img {
    max-width: 100%;
    border-radius: 8px;
    margin: 15px 0;
}

.math-image {
    display: block;
    max-width: 100%; /* Prevents image from overflowing card */
    height: auto;
    margin: 15px auto; /* Centers the image with spacing */
    border-radius: 8px; /* Matches card aesthetic */
    border: 1px solid #eee; /* Light border to define the image area */
}

/* Hide the answer box by default */
.hidden {
    display: none;
}

.puzzle-card h3 {
    font-weight: bold !important;
    display: block;
    font-size: 1.25rem; /* Adjust as needed */
    margin-bottom: 0.5rem;
}
</style>

</head>

            "content": "Consider the function $f$ defined over $\\mathbb{R}$ by $f(x) = x + \\cfrac{2}{e^x + 1}$ and designate by $(C)$ its representative curve in an orthonormal system $(O;\\vec{i},\\vec{j})$.",

            "answer": "$\\lim\\limits_{x \\to +\\infty} f(x) = \\lim\\limits_{x \\to +\\infty} \\left( x + \\cfrac{2}{e^x + 1} \\right) = +\\infty + 0 = +\\infty$. <br> $\\lim\\limits_{x \\to -\\infty} f(x) = \\lim\\limits_{x \\to -\\infty} \\left( x + \\cfrac{2}{e^x + 1} \\right) = -\\infty + 2 = -\\infty$ <br> To prove $(d)$ is an asymptote: $\\lim\\limits_{x \\to \\pm\\infty} [f(x) - y] = \\lim\\limits_{x \\to \\pm\\infty} \\cfrac{2}{e^x + 1} = 0$. <br> For relative position: $f(x) - y = \\cfrac{2}{e^x + 1} > 0$ for all $x \\in \\mathbb{R}$, so $(C)$ is above $(d)$.",

            "question": "1) Prove that $f$ admits an inverse function $f^{-1}$ over $\\mathbb{R}$ and determine its domain.",
            "answer": "Since $f$ is continuous and strictly increasing over $\\mathbb{R}$, it admits an inverse function $f^{-1}$. <br> The domain of $f^{-1}$ is the range of $f$, which is $]\\lim\\limits_{x \\to -\\infty} f(x); \\lim\\limits_{x \\to +\\infty} f(x)[ = ]-\\infty; +\\infty[$.",

            "id": "6",
            "type": "question",
            "title": "Area Calculation",
            "question": "2) Calculate the area of the domain limited by $(d)$, $(C)$, and the lines $x = -1$ and $x = 0$.",
            "answer": "Area $A = \\int_{-1}^{0} [f(x) - y] dx = \\int_{-1}^{0} \\cfrac{2}{e^x + 1} dx$. <br> Let $u = 1 + e^{-x} \\implies du = -e^{-x}dx$. <br> $A = 2\\int_{-1}^{0} \\cfrac{e^{-x}}{1 + e^{-x}} dx = [-2\\ln(1 + e^{-x})]_{-1}^{0} = -2[\\ln(2) - \\ln(1 + e)] = 2\\ln\\left(\\cfrac{1+e}{2}\\right)$ units squared.",

                        "content": "Let $f$ be the function defined over $\\mathbb{R}$ by $f(x) = (2x^2 - 3x)e^x$ and designate by $(C)$ its representative curve in an orthonormal system $(O; \\vec{i}, \\vec{j})$.",

                        "question": "Calculate $\\lim\\limits_{x \\to -\\infty} f(x)$ and $\\lim\\limits_{x \\to +\\infty} f(x)$. Deduce an asymptote to $(C)$.",
                        "answer": "$\\lim\\limits_{x \\to -\\infty} f(x) = \\lim\\limits_{x \\to -\\infty} (2x^2e^x - 3xe^x) = 0 - 0 = 0$ since $\\lim\\limits_{x \\to -\\infty} x^ne^x = 0$ (the exponential decay of $e^x$ as $x \\to -\\infty$ is much 'stronger' than the growth of any power of $x$)<br> $\\lim\\limits_{x \\to +\\infty} f(x) = \\lim\\limits_{x \\to +\\infty} 2x^2e^x = +\\infty$ since the highest power of $2x^2 - 3x$ dominates as $x \\to +\\infty$. <br> The line $y = 0$ is a horizontal asymptote to $(C)$ at $-\\infty$.",

    "question": "Prove that the curve $(C)$ has two inflection points.",
    "answer": "To find inflection points, we calculate the second derivative $f''(x)$. From $f'(x) = (2x^2 + x - 3)e^x$, we get <br> $f''(x) = (4x + 1)e^x + (2x^2 + x - 3)e^x = (2x^2 + 5x - 2)e^x$. <br> Since $e^x > 0$, the sign of $f''(x)$ depends on $2x^2 + 5x - 2$. <br> The discriminant is $\\Delta = 5^2 - 4(2)(-2) = 25 + 16 = 41 > 0$. <br> Since the quadratic has two distinct real roots where it changes sign, the curve $(C)$ has two inflection points.",

        "id": "5a",
        "type": "question",
        "title": "Inverse Function Tangent",
        "question": "The function $f$ admits over $[1; +\\infty[$ an inverse function $f^{-1}$. Calculate the slope of the tangent to the curve of $f^{-1}$ at the point of abscissa zero.",
        "answer": "At $x=0$ for $f^{-1}$, we seek $x \\in [1; +\\infty[$ such that $f(x)=0$. This occurs at $x=1.5$. The slope is $(f^{-1})'(0) = \\cfrac{1}{f'(1.5)} = \\cfrac{1}{(2(1.5)^2 + 1.5 - 3)e^{1.5}} = \\cfrac{1}{3}e^{-1.5}$.",
        "qImg": "",
        "aImg": ""
    },
    {
        "id": "5b",
        "type": "question",
        "title": "Area Calculation",
        "question": "Calculate the exact value of the area of the domain limited by the curve of $f^{-1}$, the axis of ordinates and the line of equation $y = 1$.",
        "answer": "By symmetry with respect to $y=x$, this area is equal to the area limited by $(C)$, the x-axis, and $x=1$. <br> $A = \\displaystyle \\int_{1}^{1.5} (0 - f(x)) dx = [(-2x^2 + 7x - 7)e^x]_1^{1.5} = 2e - e^{1.5} \\text{ units}^2$.",
        "qImg": "",
        "aImg": ""
    },

        "answer": "The tangent at $A$ is horizontal: $y = 9e^{-1.5} \\approx 2.008$. <br> Testing values: $f(1.62) \\approx 1.95$ and $f(1.63) \\approx 2.12$. <br> Since $1.95 < 2.008 < 2.12$, by the Intermediate Value Theorem, $\\alpha$ lies in $]1.62; 1.63[$.",

            "question": "Prove $f$ admits an inverse $f^{-1}$ over $]-\\infty; 1]$ and determine its domain.",
            "answer": "Over $]-\\infty; 1]$, $f$ is continuous and strictly increasing ($f'(x) > 0$). Thus it admits an inverse. <br> Domain of $f^{-1}$ is the image of $]-\\infty; 1]$, which is $\\left]-\\cfrac{1}{2}; \\cfrac{1}{e-2}\\right]$.",

        {

            "type": "question",
            "title": "Area and Integration",
            "question": "Calculate $\\displaystyle \\int_0^1 xe^{-x} dx$ and deduce that Area $A > 1 - \\cfrac{2}{e}$.",
            "answer": "Using integration by parts on $\\displaystyle \\int_0^1 xe^{-x} dx$: $u=x, dv=e^{-x} dx \\implies [-xe^{-x} - e^{-x}]_0^1 = 1 - \\cfrac{2}{e}$. <br> Since $\\cfrac{x}{e^x-2x} > \\cfrac{x}{e^x}$ for $x>0$, then $A = \\displaystyle \\int_0^1 f(x) dx > \\int_0^1 xe^{-x} dx = 1 - \\cfrac{2}{e}$.",

            "title": "Determination of Constants",
            "question": "Prove that $f(x) = e^{2x} - 2e^x - 3$.",
            "answer": "Asymptote: $\\displaystyle \\lim_{x \\to -\\infty} f(x) = c = -3$. <br> Point (0, -4): $f(0) = a + b - 3 = -4 \\implies a + b = -1$. <br>Horizontal tangent: $f'(x) = 2ae^{2x} + be^x$. So, $f'(0) = 2a + b = 0$. <br> Solving the system gives $a = 1$ and $b = -2$. Thus, $f(x) = e^{2x} - 2e^x - 3$.",
            "qImg": "",
            "aImg": ""
        },
        {
            "id": "2",
            "type": "question",
            "title": "Intersections",
            "question": "Calculate the abscissas of the points of intersection of $(C)$ with the line $(d): y = -3$ and with the x-axis ($x'Ox$).",
            "answer": "With $y = -3$: $e^{2x} - 2e^x - 3 = -3 \\implies e^{2x} - 2e^x = 0 \\implies e^x(e^x - 2) = 0$. So $x = \\ln(2)$. <br> With $x'Ox$: $e^{2x} - 2e^x - 3 = 0$. Let $t = e^x$: $t^2 - 2t - 3 = 0 \\implies (t-3)(t+1) = 0$. Since $t > 0$, $e^x = 3 \\implies x = \\ln(3)$.",
            "qImg": "",
            "aImg": ""
        },
        {
            "id": "3",
            "type": "question",
            "title": "Area Calculation",
            "question": "Calculate the area of the region limited by $(C)$, the x-axis, and the y-axis.",
            "answer": "Area $A = -\\displaystyle \\int_{0}^{\\ln 3} f(x) dx = -\\int_{0}^{\\ln 3} (e^{2x} - 2e^x - 3) dx$. <br> $A = -[\\frac{1}{2}e^{2x} - 2e^x - 3x]_{0}^{\\ln 3} = -[(\\frac{9}{2} - 6 - 3\\ln 3) - (\\frac{1}{2} - 2)]$. <br> $A = 3\\ln 3$ units of area.",
            "qImg": "",
            "aImg": ""
        },
        {
            "id": "4",
            "type": "question",
            "title": "Inverse Function Expression",
            "question": "Prove that $f$ admits over $[0, +\\infty[ $an inverse function $f^{-1}$ and determine the expression for $y = f^{-1}(x)$.",
            "answer": "On $[0, +\\infty[$, $f$ is continuous and strictly increasing, so $f^{-1}$ exists. <br> $y = (e^x - 1)^2 - 4 \\implies y + 4 = (e^x - 1)^2$. <br> Since $x \\ge 0, e^x - 1 \\ge 0$, so $e^x - 1 = \\sqrt{y+4}$. <br> $e^x = 1 + \\sqrt{y+4} \\implies f^{-1}(x) = \\ln(1 + \\sqrt{x+4})$.",

            "aImg": ""
        },

function init() {
    const nav = document.getElementById('nav-list');
    nav.innerHTML = '';
    const scrollTarget = document.getElementById('content'); // Get the scrollable div

    courseData.forEach((topic, tIdx) => {
        const details = document.createElement('details');
        details.className = 'sidebar-group';

        const summary = document.createElement('summary');
        summary.className = 'compact-title';
        summary.innerHTML = `${tIdx + 1}. ${topic.mainTitle}`;

        // 1. INITIAL STATE (Runs once per refresh for the first item)
        if (tIdx === 0) {
            summary.classList.add('active-link');
            details.open = true;
            displayTopic(tIdx);

            // Fix: Scroll to top on page load
            if (scrollTarget) scrollTarget.scrollTop = 0;
        }

        // 2. CLICK LOGIC
        summary.onclick = (e) => {
            document.querySelectorAll('.compact-title').forEach(el => el.classList.remove('active-link'));
            document.querySelectorAll('.sidebar-group').forEach(det => {
                if (det !== details) det.open = false;
            });

            summary.classList.add('active-link');
            displayTopic(tIdx);

            // Fix: Scroll to top when clicking a new problem
            if (scrollTarget) {
                scrollTarget.scrollTo({ top: 0, behavior: 'smooth' });
            }
        };

        const ul = document.createElement('ul');
        ul.className = 'parts-list';
        topic.parts.forEach(p => {
            const li = document.createElement('li');
            li.innerText = p.title.replace(/^Part\s[A-Z]:\s/i, "");
            ul.appendChild(li);
        });

        details.appendChild(summary);
        details.appendChild(ul);
        nav.appendChild(details);
    });
    document.getElementById('count-display').innerText = courseData.length;
}


function displayTopic(index) {
    const container = document.getElementById('problem-container');
    container.innerHTML = '';
    const topic = courseData[index];
    const section = document.createElement('div');
    section.className = 'topic-section';

    // Helper to generate Image HTML if a string exists
    const getImageHTML = (imgData) => {
        if (!imgData || imgData.trim() === "") return "";

        // Add prefix if user forgot to include it in the JSON string
        const src = imgData.startsWith('data:image')
                    ? imgData
                    : `data:image/png;base64,${imgData}`;

        return `<img src="${src}" class="math-image" alt="Problem Illustration">`;
    };

    topic.parts.forEach(p => {
        const card = document.createElement('div');
        card.className = 'puzzle-card';

        if (p.type === "context") {
            card.innerHTML = `
                <div class="header"><h3>${p.title}</h3></div>
                <div class="question-body">${p.content}</div>
                ${getImageHTML(p.qImg)}
            `;
        } else {
            card.innerHTML = `
                <div class="header"><h3>${p.id}. ${p.title}</h3></div>
                <div class="question-body">${p.question}</div>
                ${getImageHTML(p.qImg)}

                <div class="answer-link" onclick="toggleAns('${p.id}')">View Solution ▼</div>

                <div id="ans-box-${p.id}" class="answer-box hidden">
                    <div>${p.answer}</div>
                    ${getImageHTML(p.aImg)}
                </div>
            `;
        }
        section.appendChild(card);
    });

    container.appendChild(section);

    // Re-run KaTeX if present
    if (window.renderMathInElement) {
        renderMathInElement(container, {
            delimiters: [
                {left: '$$', right: '$$', display: true},
                {left: '$', right: '$', display: false}
            ],
            throwOnError: false
        });
    }
}






function filterContent() {
        const query = document.getElementById('search-box').value.toLowerCase();
        const sidebarGroups = document.querySelectorAll('.sidebar-group');
        let visibleCount = 0;

        courseData.forEach((topic, index) => {
                const sidebar = sidebarGroups[index];
                const match = topic.mainTitle.toLowerCase().includes(query) ||
                                            topic.parts.some(p => p.title.toLowerCase().includes(query));

                if (match) {
                        sidebar.classList.remove('hidden');
                        visibleCount++;
                } else {
                        sidebar.classList.add('hidden');
                }
        });

        document.getElementById('count-display').innerText = visibleCount;
}






function toggleAns(id) {
    const box = document.getElementById(`ans-box-${id}`);
    if (box) {
        box.classList.toggle('hidden');
    }
}


window.onload = init;
</script>
