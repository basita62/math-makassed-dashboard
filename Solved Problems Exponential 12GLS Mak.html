 <!-- KaTeX Auto-Render Extension with Custom Delimiter Config -->
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"
        onload="renderMathInElement(document.body, {
            delimiters: [
                {left: '$$', right: '$$', display: true},
                {left: '$', right: '$', display: false},
                {left: '\\(', right: '\\)', display: false},
                {left: '\\[', right: '\\]', display: true}
            ],
            throwOnError: false
        });">
        </script>

 <style>
/* 1. Global Variables & Base Setup */
:root {
    --accent: #2563eb;       /* Primary Blue */
    --accent-bg: #e7f3ff;    /* Light Blue for active states */
    --star-color: #f59e0b;   /* Gold for ratings */
    --bg-sidebar: #f8f9fa;   /* Light gray sidebar */
    --border-color: #e0e0e0;
    --text-main: #333;
    --text-muted: #64748b;
}

body {
    display: flex;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    margin: 0;
    height: 100vh;
    color: var(--text-main);
    overflow: hidden; /* Prevents double scrollbars */
}

/* 2. Sidebar & Search Layout */
#sidebar {
    width: 300px;
    border-right: 1px solid var(--border-color);
    padding: 20px;
    display: flex;
    flex-direction: column;
    background: var(--bg-sidebar);
    box-sizing: border-box;
}

#search-box {
    width: 100%;
    padding: 12px;
    margin-bottom: 20px;
    border: 2px solid var(--border-color);
    border-radius: 8px;
    font-size: 1rem;
    outline: none;
    transition: border-color 0.2s;
    box-sizing: border-box;
}

#search-box:focus {
    border-color: var(--accent);
}

#nav-list {
    overflow-y: auto;
    flex-grow: 1;
}

/* 3. Collapsible Sidebar Items */
.sidebar-group {
    margin-bottom: 8px;
}

/* Remove default browser arrows */
summary {
    list-style: none;
    outline: none;
}
summary::-webkit-details-marker {
    display: none;
}

/* Main Clickable Topic Title */
.compact-title {
    padding: 12px 15px;
    cursor: pointer;
    background: #ffffff;
    border: 1px solid var(--border-color);
    border-radius: 6px;
    font-weight: 600;
    transition: all 0.2s;
    border-left: 4px solid transparent;
    display: block;
}

.compact-title:hover {
    background-color: #edf2f7;
}

/* Active/Selected Highlight */
.compact-title.active-link,
details[open] .compact-title {
    background-color: var(--accent-bg);
    color: var(--accent);
    border-left-color: var(--accent);
}

/* Sub-problem Bullet List */
.parts-list {
    margin: 8px 0 15px 35px;
    padding: 0;
    list-style-type: disc;
    color: var(--text-muted);
    font-size: 0.85em;
}

.parts-list li {
    margin-bottom: 5px;
}

/* 4. Main Content Area */
#content {
    flex: 1;
    padding: 40px 60px;
    overflow-y: auto;
    background: white;
}

.puzzle-card {
    border: 1px solid var(--border-color);
    padding: 25px;
    border-radius: 12px;
    margin-bottom: 30px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 15px;
}

h3 {
    margin: 0;
    font-size: 1.3rem;
    color: #1a202c;
}

/* Solution Box Styling */
.answer-link {
    display: inline-block;
    color: var(--accent);
    cursor: pointer;
    font-weight: 600;
    margin-top: 20px;
}

.answer-box {
    background: #f0f7ff;
    padding: 20px;
    margin-top: 15px;
    border-left: 5px solid var(--accent);
    border-radius: 4px;
}

/* 5. Utility Classes */
.hidden {
    display: none !important;
}

.image-div img {
    max-width: 100%;
    border-radius: 8px;
    margin: 15px 0;
}

.math-image {
    display: block;
    max-width: 100%; /* Prevents image from overflowing card */
    height: auto;
    margin: 15px auto; /* Centers the image with spacing */
    border-radius: 8px; /* Matches card aesthetic */
    border: 1px solid #eee; /* Light border to define the image area */
}

/* Hide the answer box by default */
.hidden {
    display: none;
}

.puzzle-card h3 {
    font-weight: bold !important;
    display: block;
    font-size: 1.25rem; /* Adjust as needed */
    margin-bottom: 0.5rem;
}
</style>

</head>

            "content": "Consider the function $f$ defined over $\\mathbb{R}$ by $f(x) = x + \\cfrac{2}{e^x + 1}$ and designate by $(C)$ its representative curve in an orthonormal system $(O;\\vec{i},\\vec{j})$.",

            "answer": "$\\lim\\limits_{x \\to +\\infty} f(x) = \\lim\\limits_{x \\to +\\infty} \\left( x + \\cfrac{2}{e^x + 1} \\right) = +\\infty + 0 = +\\infty$. <br> $\\lim\\limits_{x \\to -\\infty} f(x) = \\lim\\limits_{x \\to -\\infty} \\left( x + \\cfrac{2}{e^x + 1} \\right) = -\\infty + 2 = -\\infty$ <br> To prove $(d)$ is an asymptote: $\\lim\\limits_{x \\to \\pm\\infty} [f(x) - y] = \\lim\\limits_{x \\to \\pm\\infty} \\cfrac{2}{e^x + 1} = 0$. <br> For relative position: $f(x) - y = \\cfrac{2}{e^x + 1} > 0$ for all $x \\in \\mathbb{R}$, so $(C)$ is above $(d)$.",

            "question": "1) Prove that $f$ admits an inverse function $f^{-1}$ over $\\mathbb{R}$ and determine its domain.",
            "answer": "Since $f$ is continuous and strictly increasing over $\\mathbb{R}$, it admits an inverse function $f^{-1}$. <br> The domain of $f^{-1}$ is the range of $f$, which is $]\\lim\\limits_{x \\to -\\infty} f(x); \\lim\\limits_{x \\to +\\infty} f(x)[ = ]-\\infty; +\\infty[$.",

            "id": "6",
            "type": "question",
            "title": "Area Calculation",
            "question": "2) Calculate the area of the domain limited by $(d)$, $(C)$, and the lines $x = -1$ and $x = 0$.",
            "answer": "Area $A = \\int_{-1}^{0} [f(x) - y] dx = \\int_{-1}^{0} \\cfrac{2}{e^x + 1} dx$. <br> Let $u = 1 + e^{-x} \\implies du = -e^{-x}dx$. <br> $A = 2\\int_{-1}^{0} \\cfrac{e^{-x}}{1 + e^{-x}} dx = [-2\\ln(1 + e^{-x})]_{-1}^{0} = -2[\\ln(2) - \\ln(1 + e)] = 2\\ln\\left(\\cfrac{1+e}{2}\\right)$ units squared.",

                        "content": "Let $f$ be the function defined over $\\mathbb{R}$ by $f(x) = (2x^2 - 3x)e^x$ and designate by $(C)$ its representative curve in an orthonormal system $(O; \\vec{i}, \\vec{j})$.",

                        "question": "Calculate $\\lim\\limits_{x \\to -\\infty} f(x)$ and $\\lim\\limits_{x \\to +\\infty} f(x)$. Deduce an asymptote to $(C)$.",
                        "answer": "$\\lim\\limits_{x \\to -\\infty} f(x) = \\lim\\limits_{x \\to -\\infty} (2x^2e^x - 3xe^x) = 0 - 0 = 0$ since $\\lim\\limits_{x \\to -\\infty} x^ne^x = 0$ (the exponential decay of $e^x$ as $x \\to -\\infty$ is much 'stronger' than the growth of any power of $x$)<br> $\\lim\\limits_{x \\to +\\infty} f(x) = \\lim\\limits_{x \\to +\\infty} 2x^2e^x = +\\infty$ since the highest power of $2x^2 - 3x$ dominates as $x \\to +\\infty$. <br> The line $y = 0$ is a horizontal asymptote to $(C)$ at $-\\infty$.",

    "question": "Prove that the curve $(C)$ has two inflection points.",
    "answer": "To find inflection points, we calculate the second derivative $f''(x)$. From $f'(x) = (2x^2 + x - 3)e^x$, we get <br> $f''(x) = (4x + 1)e^x + (2x^2 + x - 3)e^x = (2x^2 + 5x - 2)e^x$. <br> Since $e^x > 0$, the sign of $f''(x)$ depends on $2x^2 + 5x - 2$. <br> The discriminant is $\\Delta = 5^2 - 4(2)(-2) = 25 + 16 = 41 > 0$. <br> Since the quadratic has two distinct real roots where it changes sign, the curve $(C)$ has two inflection points.",

        "id": "5a",
        "type": "question",
        "title": "Inverse Function Tangent",
        "question": "The function $f$ admits over $[1; +\\infty[$ an inverse function $f^{-1}$. Calculate the slope of the tangent to the curve of $f^{-1}$ at the point of abscissa zero.",
        "answer": "At $x=0$ for $f^{-1}$, we seek $x \\in [1; +\\infty[$ such that $f(x)=0$. This occurs at $x=1.5$. The slope is $(f^{-1})'(0) = \\cfrac{1}{f'(1.5)} = \\cfrac{1}{(2(1.5)^2 + 1.5 - 3)e^{1.5}} = \\cfrac{1}{3}e^{-1.5}$.",
        "qImg": "",
        "aImg": ""
    },
    {
        "id": "5b",
        "type": "question",
        "title": "Area Calculation",
        "question": "Calculate the exact value of the area of the domain limited by the curve of $f^{-1}$, the axis of ordinates and the line of equation $y = 1$.",
        "answer": "By symmetry with respect to $y=x$, this area is equal to the area limited by $(C)$, the x-axis, and $x=1$. <br> $A = \\displaystyle \\int_{1}^{1.5} (0 - f(x)) dx = [(-2x^2 + 7x - 7)e^x]_1^{1.5} = 2e - e^{1.5} \\text{ units}^2$.",
        "qImg": "",
        "aImg": ""
    },

        "answer": "The tangent at $A$ is horizontal: $y = 9e^{-1.5} \\approx 2.008$. <br> Testing values: $f(1.62) \\approx 1.95$ and $f(1.63) \\approx 2.12$. <br> Since $1.95 < 2.008 < 2.12$, by the Intermediate Value Theorem, $\\alpha$ lies in $]1.62; 1.63[$.",

            "question": "Prove $f$ admits an inverse $f^{-1}$ over $]-\\infty; 1]$ and determine its domain.",
            "answer": "Over $]-\\infty; 1]$, $f$ is continuous and strictly increasing ($f'(x) > 0$). Thus it admits an inverse. <br> Domain of $f^{-1}$ is the image of $]-\\infty; 1]$, which is $\\left]-\\cfrac{1}{2}; \\cfrac{1}{e-2}\\right]$.",

        {

            "type": "question",
            "title": "Area and Integration",
            "question": "Calculate $\\displaystyle \\int_0^1 xe^{-x} dx$ and deduce that Area $A > 1 - \\cfrac{2}{e}$.",
            "answer": "Using integration by parts on $\\displaystyle \\int_0^1 xe^{-x} dx$: $u=x, dv=e^{-x} dx \\implies [-xe^{-x} - e^{-x}]_0^1 = 1 - \\cfrac{2}{e}$. <br> Since $\\cfrac{x}{e^x-2x} > \\cfrac{x}{e^x}$ for $x>0$, then $A = \\displaystyle \\int_0^1 f(x) dx > \\int_0^1 xe^{-x} dx = 1 - \\cfrac{2}{e}$.",

            "title": "Determination of Constants",
            "question": "Prove that $f(x) = e^{2x} - 2e^x - 3$.",
            "answer": "Asymptote: $\\displaystyle \\lim_{x \\to -\\infty} f(x) = c = -3$. <br> Point (0, -4): $f(0) = a + b - 3 = -4 \\implies a + b = -1$. <br>Horizontal tangent: $f'(x) = 2ae^{2x} + be^x$. So, $f'(0) = 2a + b = 0$. <br> Solving the system gives $a = 1$ and $b = -2$. Thus, $f(x) = e^{2x} - 2e^x - 3$.",
            "qImg": "",
            "aImg": ""
        },
        {
            "id": "2",
            "type": "question",
            "title": "Intersections",
            "question": "Calculate the abscissas of the points of intersection of $(C)$ with the line $(d): y = -3$ and with the x-axis ($x'Ox$).",
            "answer": "With $y = -3$: $e^{2x} - 2e^x - 3 = -3 \\implies e^{2x} - 2e^x = 0 \\implies e^x(e^x - 2) = 0$. So $x = \\ln(2)$. <br> With $x'Ox$: $e^{2x} - 2e^x - 3 = 0$. Let $t = e^x$: $t^2 - 2t - 3 = 0 \\implies (t-3)(t+1) = 0$. Since $t > 0$, $e^x = 3 \\implies x = \\ln(3)$.",
            "qImg": "",
            "aImg": ""
        },
        {
            "id": "3",
            "type": "question",
            "title": "Area Calculation",
            "question": "Calculate the area of the region limited by $(C)$, the x-axis, and the y-axis.",
            "answer": "Area $A = -\\displaystyle \\int_{0}^{\\ln 3} f(x) dx = -\\int_{0}^{\\ln 3} (e^{2x} - 2e^x - 3) dx$. <br> $A = -[\\frac{1}{2}e^{2x} - 2e^x - 3x]_{0}^{\\ln 3} = -[(\\frac{9}{2} - 6 - 3\\ln 3) - (\\frac{1}{2} - 2)]$. <br> $A = 3\\ln 3$ units of area.",
            "qImg": "",
            "aImg": ""
        },
        {
            "id": "4",
            "type": "question",
            "title": "Inverse Function Expression",
            "question": "Prove that $f$ admits over $[0, +\\infty[ $an inverse function $f^{-1}$ and determine the expression for $y = f^{-1}(x)$.",
            "answer": "On $[0, +\\infty[$, $f$ is continuous and strictly increasing, so $f^{-1}$ exists. <br> $y = (e^x - 1)^2 - 4 \\implies y + 4 = (e^x - 1)^2$. <br> Since $x \\ge 0, e^x - 1 \\ge 0$, so $e^x - 1 = \\sqrt{y+4}$. <br> $e^x = 1 + \\sqrt{y+4} \\implies f^{-1}(x) = \\ln(1 + \\sqrt{x+4})$.",

            "aImg": ""
        },

            "content": "Consider the function $f$ defined over $\\mathbb{R}$ by $f(x) = \\cfrac{x}{e^x - x}$ and designate by $(C)$ its representative curve in an orthonormal system $(O;\\vec{i},\\vec{j})$.",

            "title": "Limits of f",
            "question": "Calculate the limits of $f$ at $-\\infty$ and $+\\infty$.",
            "answer": "$\\lim\\limits_{x \\to -\\infty} f(x) = \\lim\\limits_{x \\to -\\infty} \\cfrac{x}{e^x - x} = \\lim\\limits_{x \\to -\\infty} \\cfrac{1}{\\cfrac{e^x}{x} - 1} = \\cfrac{1}{0 - 1} = -1$ (since $\\lim\\limits_{x \\to -\\infty} e^x = 0$). <br> $\\lim\\limits_{x \\to +\\infty} f(x) = \\lim\\limits_{x \\to +\\infty} \\cfrac{x}{e^x(1 - xe^{-x})} = \\lim\\limits_{x \\to +\\infty} \\cfrac{x}{e^x} \\cdot \\cfrac{1}{1-0} = 0$.",

            "title": "Derivative and Variations",
            "question": "Show that $f'(x) = \\cfrac{e^x(1 - x)}{(e^x - x)^2}$ and then set up the table of variations of $f$.",

            "title": "Tangent Equation",
            "question": "Write the equation of the tangent $(T)$ to $(C)$ at the point of abscissa 0.",
            "answer": "The equation of the tangent is given by $y = f'(0)(x - 0) + f(0)$. <br> $f(0) = \\cfrac{0}{e^0 - 0} = 0$. <br> $f'(0) = \\cfrac{e^0(1 - 0)}{(e^0 - 0)^2} = 1$. <br> Therefore, the equation of $(T)$ is $y = x$.",

            "type": "question",
            "title": "Auxiliary Function g Limits",
            "question": "Consider the function $g$ defined over $\\mathbb{R}$ by $g(x) = e^x - x - 1$. <br> a) Find the limits of $g$ at $-\\infty$ and $+\\infty$.",
            "answer": "$\\lim\\limits_{x \\to -\\infty} g(x) = \\lim\\limits_{x \\to -\\infty} (e^x - x - 1) = 0 - (-\\infty) - 1 = +\\infty$. <br> $\\lim\\limits_{x \\to +\\infty} g(x) = \\lim\\limits_{x \\to +\\infty} e^x\\left(1 - \\cfrac{x}{e^x} - \\cfrac{1}{e^x}\\right) = (+\\infty)(1 - 0 - 0) = +\\infty$.",

        },
        {
            "id": "4b",
            "type": "question",
            "title": "Variations and Sign of g",
            "question": "Find $g'(x)$ and then set up the table of variations of $g$, deduce then the sign of $g(x)$ over $\\mathbb{R}$.",

    "id": "M8",
    "mainTitle": "Exponential Function",
    "parts": [
        {
            "id": "intro",
            "type": "context",
            "title": "Function Definition",
            "content": "Consider the function $f$ defined over $\\mathbb{R}$ by $f(x) = \\cfrac{e^{2x}-4e^x+1}{e^{2x}+1}$ and designate by $(C)$ its representative curve in an orthonormal system $(O;\\vec{i},\\vec{j})$.",
            "qImg": ""
        },
        {
            "id": "1",
            "type": "question",
            "title": "Limits and Asymptotes",
            "question": "Calculate the limits of $f$ at $-\\infty$ and $+\\infty$. Deduce an asymptote to $(C)$.",
            "answer": "$\\lim\\limits_{x \\to -\\infty} f(x) = \\lim\\limits_{x \\to -\\infty} \\cfrac{0 - 0 + 1}{0 + 1} = 1$ (since $\\lim\\limits_{x \\to -\\infty} e^x = 0$). <br> For $+\\infty$, factor out $e^{2x}$: <br> $\\lim\\limits_{x \\to +\\infty} f(x) = \\lim\\limits_{x \\to +\\infty} \\cfrac{e^{2x}(1 - 4e^{-x} + e^{-2x})}{e^{2x}(1 + e^{-2x})} = \\cfrac{1 - 0 + 0}{1 + 0} = 1$. <br> Therefore, the line $y = 1$ is a horizontal asymptote to $(C)$ at both $-\\infty$ and $+\\infty$.",
            "qImg": "",
            "aImg": ""
        },
        {
            "id": "2",
            "type": "question",
            "title": "Parity and Symmetry",
            "question": "Study the parity of $f$. What can we deduce about $(C)$?",
            "answer": "$f(-x) = \\cfrac{e^{-2x}-4e^{-x}+1}{e^{-2x}+1} = \\cfrac{\\frac{1}{e^{2x}} - \\frac{4}{e^x} + 1}{\\frac{1}{e^{2x}} + 1}$. <br> Multiplying the numerator and denominator by $e^{2x}$ gives: <br> $f(-x) = \\cfrac{1 - 4e^x + e^{2x}}{1 + e^{2x}} = f(x)$. <br> Thus, $f$ is an even function, meaning the curve $(C)$ is symmetric with respect to the y-axis (axis of ordinates).",
            "qImg": "",
            "aImg": ""
        },
        {
            "id": "3",
            "type": "question",
            "title": "Derivative and Variations",
            "question": "Show that $f'(x) = \\cfrac{4e^x(e^{2x}-1)}{(e^{2x}+1)^2}$ and then set up the table of variations of $f$.",
            "answer": "$f(x) = 1 - \\cfrac{4e^x}{e^{2x}+1}$. Using the quotient rule on the fractional part: <br> $f'(x) = -\\cfrac{4e^x(e^{2x}+1) - 4e^x(2e^{2x})}{(e^{2x}+1)^2} = -\\cfrac{4e^x - 4e^{3x}}{(e^{2x}+1)^2} = \\cfrac{4e^x(e^{2x}-1)}{(e^{2x}+1)^2}$. <br> Since $4e^x > 0$ and $(e^{2x}+1)^2 > 0$, the sign depends on $e^{2x}-1$: <br> For $x < 0$: $f'(x) < 0$ ($f$ is strictly decreasing). <br> For $x > 0$: $f'(x) > 0$ ($f$ is strictly increasing). <br> Minimum is at $f(0) = \\cfrac{1-4+1}{1+1} = -1$.",

            "type": "question",
            "title": "Inverse Function over $[0, +\\infty[$",
            "question": "Show that over $[0; +\\infty[$, $f$ admits an inverse function $f^{-1}$ whose domain of definition is to be determined.",
            "answer": "Over $[0; +\\infty[$, $f$ is continuous and strictly increasing. Therefore, it satisfies the conditions to admit an inverse function $f^{-1}$. <br> The domain of $f^{-1}$ is the image range of $[0; +\\infty[$, which is $[f(0); \\lim\\limits_{x \\to +\\infty} f(x)[ = [-1; 1[$.",

        {
            "id": "7",
            "type": "question",
            "title": "Integral Function Bounds (Positive Side)",
            "question": "Consider the function $F$ defined over $\\mathbb{R}$ by $F(x) = \\int_{0}^{x} f(t)dt$. <br> a. Show that for every $t > 0$, $f(t) \\ge 1 - 4e^{-t}$ and then deduce that $F(x) \\ge x - 4 + 4e^{-x}$. <br> b. Deduce $\\lim\\limits_{x \\to +\\infty} F(x) = +\\infty$.",
            "answer": "a. $f(t) = 1 - \\cfrac{4e^t}{e^{2t}+1}$. Since $e^{2t}+1 > e^{2t}$, then $\\cfrac{4e^t}{e^{2t}+1} < \\cfrac{4e^t}{e^{2t}} = 4e^{-t} \\implies f(t) \\ge 1 - 4e^{-t}$. <br> Integrating both sides from $0$ to $x$: $F(x) \\ge \\int_{0}^{x} (1 - 4e^{-t})dt = [t + 4e^{-t}]_0^x = x + 4e^{-x} - 4$. <br> b. Since $\\lim\\limits_{x \\to +\\infty} (x - 4 + 4e^{-x}) = +\\infty$, by the squeeze/comparison theorem, $\\lim\\limits_{x \\to +\\infty} F(x) = +\\infty$.",
            "qImg": "",
            "aImg": ""
        },
        {
            "id": "8",
            "type": "question",
            "title": "Integral Function Bounds (Negative Side)",
            "question": "a. Knowing that for every $t < 0$, $f(t) \\ge 1 - 4e^t$, show that $\\int_{x}^{0} f(t)dt \\ge -x - 4 + 4e^x$ and then deduce that $F(x) \\le x + 4 - 4e^x$. <br> b. Deduce $\\lim\\limits_{x \\to -\\infty} F(x) = -\\infty$.",
            "answer": "a. Integrating the inequality from $x$ to $0$ (where $x < 0$): <br> $\\int_{x}^{0} f(t)dt \\ge \\int_{x}^{0} (1 - 4e^t)dt = [t - 4e^t]_x^0 = (0 - 4) - (x - 4e^x) = -x - 4 + 4e^x$. <br> Since $F(x) = \\int_{0}^{x} f(t)dt = -\\int_{x}^{0} f(t)dt$, multiplying by $-1$ reverses the inequality sign: $F(x) \\le x + 4 - 4e^x$. <br> b. Since $\\lim\\limits_{x \\to -\\infty} (x + 4 - 4e^x) = -\\infty$, by comparison, $\\lim\\limits_{x \\to -\\infty} F(x) = -\\infty$.",
            "qImg": "",
            "aImg": ""
        },

            "type": "question",
            "title": "Table of Variations of F",
            "question": "Set up the table of variations of $F$.",

            "title": "Bounded Region Area",
            "question": "Calculate the area of the region bounded between the curve $(C)$, the x-axis, the y-axis and the straight line of equation $x = 1$.",
            "answer": "The area is given by the integral: $A = \\int_{0}^{1} xe^x dx$. <br> Using integration by parts with $u = x \\implies du = dx$ and $dv = e^x dx \\implies v = e^x$: <br> $A = [xe^x]_0^1 - \\int_{0}^{1} e^x dx = (1\\cdot e^1 - 0) - [e^x]_0^1 = e - (e - 1) = 1\\text{ unit}^2$.",
            "qImg": "",
            "aImg": ""
        },
        {
            "id": "A2",
            "type": "question",
            "title": "Triangle and Trapezoid Areas",
            "question": "Calculate the area of the triangle $OMP$ and that of the trapezoid $MNQP$.",
            "answer": "The coordinates of the points are $O(0,0)$, $P(m,0)$, $M(m, me^m)$, $Q(1,0)$, and $N(1, e)$. <br> Area of triangle OMP: <br> $\\text{Area}(OMP) = \\cfrac{1}{2} \\cdot \\text{base} \\cdot \\text{height} = \\cfrac{1}{2} \\cdot m \\cdot me^m = \\cfrac{1}{2} m^2 e^m$. <br> Area of trapezoid MNQP: <br> $\\text{Area}(MNQP) = \\cfrac{1}{2} \\cdot (\\text{Base}_1 + \\text{Base}_2) \\cdot \\text{height} = \\cfrac{1}{2} (me^m + e)(1 - m) = \\cfrac{1}{2}(me^m - m^2 e^m + e - me)$.",
            "qImg": "",
            "aImg": ""
        },

            "type": "question",
            "title": "Domain Area D_m Proof",
            "question": "Designate by $D_m$ the area of the domain limited by the segments $[OM]$, $[MN]$ and $(C)$. Show that $D_m = \\cfrac{1}{2}(me^m - me + e - 2)$.",
            "answer": "The total geometric area under the polygonal path $OMN$ is the sum of the triangle and the trapezoid: <br> $\\text{Area}_{\\text{total}} = \\cfrac{1}{2}m^2 e^m + \\cfrac{1}{2}(me^m - m^2 e^m + e - me) = \\cfrac{1}{2}(me^m + e - me)$. <br> The total area under the curve $(C)$ from $0$ to $1$ is $1$ (from part 1). <br> The area $D_m$ bounded between the linear chords and the lower curve is the difference: <br> $D_m = \\text{Area}_{\\text{total}} - \\text{Area}_{\\text{curve}} = \\cfrac{1}{2}(me^m + e - me) - 1 = \\cfrac{1}{2}(me^m - me + e - 2)$.",

            "type": "question",
            "title": "Unique Root Alpha Proof",
            "question": "Show that the equation $f'(x) = 0$ admits a unique root $\\alpha$ such that $0.5 \\lt \\alpha \\lt 0.6$.",
            "answer": "From the table of variations of $f'$, $f'(x)$ is strictly increasing on $[0, +\\infty[$ from -ve to +ve, so the equation $f'(x) = 0$ admits a unique root $\\alpha$. <br> Testing endpoints: <br> $f'(0.5) = e^{0.5}(1.5) - e \\approx 2.473 - 2.718 = -0.245 < 0$. <br> $f'(0.6) = e^{0.6}(1.6) - e \\approx 2.915 - 2.718 = +0.197 > 0$. <br> Since $f'(0.5) \\cdot f'(0.6) < 0$, therefore $\\alpha \\in ]0.5, 0.6[$.",
            "qImg": "",
            "aImg": ""
        },

            "id": "B5",
            "type": "question",
            "title": "Minimum Area Value of m",
            "question": "Deduce that there exists a value of $m$ for which $D_m$ is minimum and then find this minimum in terms of $\\alpha$.",
            "answer": "Observe that $D_m = \\cfrac{1}{2}(me^m - me + e - 2) = \\cfrac{1}{2} f(m)$. <br> To minimize $D_m$, we find its stationary points: $\\cfrac{dD_m}{dm} = \\cfrac{1}{2} f'(m) = 0 \\implies m = \\alpha$. <br> Since $f'(\\alpha) = e^\\alpha(1+\\alpha) - e = 0 \\implies e^\\alpha = \\cfrac{e}{1+\\alpha}$. <br> Substituting this property back into $f(\\alpha)$: <br> $f(\\alpha) = \\alpha\\left(\\cfrac{e}{1+\\alpha}\\right) + e - \\alpha e - 2 = e\\left(\\cfrac{\\alpha + 1 - \\alpha(1+\\alpha)}{1+\\alpha}\\right) - 2 = \\cfrac{e(1-\\alpha^2)}{1+\\alpha} - 2 = e(1-\\alpha) - 2$. <br> Thus, the minimum area value is $D_\\alpha = \\cfrac{1}{2}[e(1-\\alpha) - 2]$.",
            "qImg": "",
            "aImg": ""
        }

            "answer": "For $-\\infty$: Expand the expression: $g(x) = 4 + 2xe^x - 4e^x$. <br> Since $\\lim\\limits_{x \\to -\\infty} xe^x = 0$ and $\\lim\\limits_{x \\to -\\infty} e^x = 0$, we get: <br> $\\lim\\limits_{x \\to -\\infty} g(x) = 4 + 0 - 0 = 4$. <br><br> For $+\\infty$: <br> $\\lim\\limits_{x \\to +\\infty} g(x) = 4 + 2(+\\infty)(+\\infty) = +\\infty$.",

            "id": "A2",
            "type": "question",
            "title": "Existence and Bounds of Alpha",
            "question": "Verify that $g(0) = 0$, then show that the equation $g(x) = 0$ has another root (denoted $\\alpha$) and verify that $1.59 < \\alpha < 1.61$.",
            "answer": "Verification: $g(0) = 4 + 2e^0(0 - 2) = 4 - 4 = 0$. <br><br> Existence of $\\alpha$: On the interval $[1; +\\infty[$, $g$ is continuous and strictly increasing. Since $g(1) = 4-2e < 0$ and $\\lim\\limits_{x \\to +\\infty} g(x) = +\\infty$, the value $0$ lies within the range. By the Intermediate Value Theorem, there is a unique root $\\alpha > 1$ such that $g(\\alpha) = 0$. <br><br> Bounding $\\alpha$: <br> * $g(1.59) = 4 + 2e^{1.59}(1.59 - 2) \\approx -0.021 < 0$ <br> * $g(1.61) = 4 + 2e^{1.61}(1.61 - 2) \\approx +0.098 > 0$ <br> Since $g(1.59) \\cdot g(1.61) < 0$, it is verified that $1.59 < \\alpha < 1.61$.",
            "qImg": "",
            "aImg": ""
        },

            "question": "Study, according to the values of $x$, the sign of $g(x)$ over $\\mathbb{R}$.",
            "answer": "From the variations and roots ($0$ and $\\alpha$): <br> * For $x \\in ]-\\infty; 0[ \\cup ]\\alpha; +\\infty[$: $g(x) > 0$. <br> * For $x \\in ]0; \\alpha[$: $g(x) < 0$. <br> * For $x = 0$ and $x = \\alpha$: $g(x) = 0$.",

            "title": "Part B: Main Function f",
            "content": "In this part take $\\alpha = 1.6$. Consider the function $f$ defined over $\\mathbb{R}$ as $f(x) = \\cfrac{2-e^x}{e^x-2x}$, and let $(C)$ be its representative curve in an orthonormal system $(O;\\vec{i},\\vec{j})$.",
            "qImg": ""

        {
            "id": "B1a",
            "type": "question",
            "title": "Limits of f",
            "question": "Determine $\\lim\\limits_{x \\to -\\infty} f(x)$ and show that $\\lim\\limits_{x \\to +\\infty} f(x) = -1$.",
            "answer": "For $-\\infty$: <br> $\\lim\\limits_{x \\to -\\infty} f(x) = \\lim\\limits_{x \\to -\\infty} \\cfrac{2 - e^x}{e^x - 2x} = \\cfrac{2 - 0}{0 - (-\\infty)} = 0$. <br><br> For $+\\infty$: Factor out $e^x$ from the numerator and denominator: <br> $\\lim\\limits_{x \\to +\\infty} f(x) = \\lim\\limits_{x \\to +\\infty} \\cfrac{e^x(2e^{-x} - 1)}{e^x(1 - 2xe^{-x})} = \\cfrac{0 - 1}{1 - 0} = -1$.",
            "qImg": "",
            "aImg": ""
        },

            "title": "Asymptotes",
            "question": "Deduce that $(C)$ has two horizontal asymptotes, the x-axis and another line $(d)$ whose equation is to be determined.",
            "answer": "* Since $\\lim\\limits_{x \\to -\\infty} f(x) = 0$, the line $y = 0$ (the x-axis) is a horizontal asymptote to $(C)$ at $-\\infty$. <br> * Since $\\lim\\limits_{x \\to +\\infty} f(x) = -1$, the line $(d)$ with equation $y = -1$ is a horizontal asymptote to $(C)$ at $+\\infty$.",

        {
            "id": "B2",
            "type": "question",
            "title": "Derivative and Variations of f",
            "question": "Show that $f'(x) = \\cfrac{g(x)}{(e^x-2x)^2}$ and set up the table of variation of $f$.",

            "id": "B4a",
            "type": "question",
            "title": "Primitive Verification",
            "question": "Show that $\\int f(x)dx = -\\ln(e^x - 2x) + C$ where $C$ is a constant real number.",
            "answer": "Notice that the numerator is the negative derivative of the denominator block. <br> Let $u(x) = e^x - 2x \\implies u'(x) = e^x - 2$. <br> Then $f(x) = \\cfrac{2-e^x}{e^x-2x} = -\\cfrac{u'(x)}{u(x)}$. <br> Integrating gives $\\int f(x)dx = -\\ln|e^x - 2x| + C$. Since $e^x - 2x > 0$ for all real $x$, this simplifies directly to $-\\ln(e^x - 2x) + C$.",
            "qImg": "",
            "aImg": ""
        },
        {
            "id": "B4b",
            "type": "question",
            "title": "Bounded Area Computation",
            "question": "Deduce the area of the region bounded by $(C)$, the x-axis and the two straight lines of equations $x = -1$ and $x = 0$.",
            "answer": "Since $f(x) > 0$ on the interval $[-1; 0]$, the area is given by: <br> $A = \\int_{-1}^{0} f(x)dx = \\left[-\\ln(e^x - 2x)\\right]_{-1}^{0}$ <br> $A = -\\ln(e^0 - 0) - \\left(-\\ln(e^{-1} - 2(-1))\\right) = -\\ln(1) + \\ln(e^{-1} + 2) = \\ln\\left(\\cfrac{1}{e} + 2\\right) = \\ln\\left(\\cfrac{1+2e}{e}\\right) = \\ln(1+2e) - 1\\text{ unit}^2$.",
            "qImg": "",
            "aImg": ""
        }

    {
    "id": "M11",
    "mainTitle": "Exponential Function",
    "parts": [
        {
            "id": "intro",
            "type": "context",
            "title": "Function Definition",
            "content": "Let $f$ be the function defined on the interval $[0; +\\infty[$ by $f(x) = (x-1)(2-e^{-x})$. Its representative curve $(C)$ is to be plotted in an orthonormal coordinate system (graphical unit: $2\\text{ cm}$).",
            "qImg": ""
        },
        {
            "id": "1a",
            "type": "question",
            "title": "Limit at Infinity",
            "question": "Study the limit of $f$ at $+\\infty$.",
            "answer": "$\\lim\\limits_{x \\to +\\infty} f(x) = \\lim\\limits_{x \\to +\\infty} (x-1)(2-e^{-x})$. <br> Since $\\lim\\limits_{x \\to +\\infty} (x-1) = +\\infty$ and $\\lim\\limits_{x \\to +\\infty} (2-e^{-x}) = 2 - 0 = 2$, we get: <br> $\\lim\\limits_{x \\to +\\infty} f(x) = (+\\infty) \\cdot 2 = +\\infty$.",
            "qImg": "",
            "aImg": ""
        },
        {
            "id": "1b",
            "type": "question",
            "title": "Oblique Asymptote Proof",
            "question": "Show that the line $(\\Delta)$ with equation $y = 2x - 2$ is an asymptote to $(C)$.",
            "answer": "Expand $f(x)$: $f(x) = 2x - 2x e^{-x} - 2 + e^{-x} = (2x - 2) - (x-1)e^{-x}$. <br> Now find the limit of the difference: <br> $\\lim\\limits_{x \\to +\\infty} [f(x) - (2x - 2)] = \\lim\\limits_{x \\to +\\infty} [-(x-1)e^{-x}] = \\lim\\limits_{x \\to +\\infty} (-xe^{-x} + e^{-x}) = 0$. <br> Since the limit is 0, the straight line $(\\Delta): y = 2x - 2$ is an oblique asymptote to $(C)$ at $+\\infty$.",
            "qImg": "",
            "aImg": ""
        },
        {
            "id": "1c",
            "type": "question",
            "title": "Relative Position",
            "question": "Study the relative position of $(C)$ and $(\\Delta)$.",
            "answer": "Consider the sign of the difference: $f(x) - y_{(\\Delta)} = -(x-1)e^{-x}$. <br> Since $e^{-x} > 0$ for all $x$: <br> * For $0 \\le x < 1$: $x-1 < 0 \\implies -(x-1)e^{-x} > 0$, so $(C)$ is above $(\\Delta)$. <br> * For $x > 1$: $x-1 > 0 \\implies -(x-1)e^{-x} < 0$, so $(C)$ is below $(\\Delta)$. <br> * For $x = 1$: $f(1) - y_{(\\Delta)} = 0$, so $(C)$ and $(\\Delta)$ intersect at the point $(1, 0)$.",
            "qImg": "",
            "aImg": ""
        },
        {
            "id": "2a",
            "type": "question",
            "title": "Derivative Calculation",
            "question": "Calculate $f'(x)$ and show that $f'(x) = xe^{-x} + 2(1-e^{-x})$.",
            "answer": "Using the product rule $(uv)' = u'v + uv'$ with $u = x-1 \\implies u'=1$ and $v = 2-e^{-x} \\implies v'=e^{-x}$: <br> $f'(x) = 1 \\cdot (2-e^{-x}) + (x-1)e^{-x} = 2 - e^{-x} + xe^{-x} - e^{-x}$ <br> $f'(x) = xe^{-x} + 2 - 2e^{-x} = xe^{-x} + 2(1-e^{-x})$.",
            "qImg": "",
            "aImg": ""
        },
        {
            "id": "2b",
            "type": "question",
            "title": "Sign of the Derivative",
            "question": "Deduce that, for any strictly positive real number $x$, $f'(x) > 0$.",
            "answer": "Let $x > 0$: <br> * The first term $xe^{-x} > 0$ because both $x$ and $e^{-x}$ are strictly positive. <br> * For the second term, $x > 0 \\implies -x < 0 \\implies e^{-x} < 1 \\implies 1 - e^{-x} > 0$. <br> Since both components are strictly positive, their sum satisfies $f'(x) > 0$ for all $x > 0$.",
            "qImg": "",
            "aImg": ""
        },
        {
            "id": "2c",
            "type": "question",
            "title": "Variations of f",
            "question": "State the value of $f'(0)$, then set up the table of variations of $f$.",

            "answer": "On $[1, 3]$, $x \\ge 1$, so $(C)$ lies below $(\\Delta)$. The area in units of area is given by: <br> $I = \\int_{1}^{3} [y_{\\Delta} - f(x)] dx = \\int_{1}^{3} (x-1)e^{-x} dx$. <br> Let $u = x-1 \\implies du = dx$ and $dv = e^{-x}dx \\implies v = -e^{-x}$: <br> $I = [-(x-1)e^{-x}]_1^3 - \\int_{1}^{3} -e^{-x} dx = (-2e^{-3} - 0) - [e^{-x}]_1^3 = -2e^{-3} - e^{-3} + e^{-1} = e^{-1} - 3e^{-3}\\text{ u.a.}$ <br> Since $1\\text{ unit} = 2\\text{ cm}$, $1\\text{ unit of area (u.a.)} = 2 \\times 2 = 4\\text{ cm}^2$. <br> $\\text{Area} = 4(e^{-1} - 3e^{-3}) = 4e^{-1} - 12e^{-3}\\text{ cm}^2 \\approx 0.87\\text{ cm}^2$.",
            "qImg": "",
            "aImg": ""
        },
        {
            "id": "4a",
            "type": "question",
            "title": "Parallel Tangent Point",
            "question": "Determine the point $A$ of $(C)$ where the tangent to $(C)$ is parallel to $(\\Delta)$.",
            "answer": "The slope of $(\\Delta)$ is $2$. Tangents parallel to $(\\Delta)$ must satisfy $f'(x) = 2$: <br> $xe^{-x} + 2 - 2e^{-x} = 2 \\implies e^{-x}(x - 2) = 0$. <br> Since $e^{-x} \\neq 0$, we have $x = 2$. <br> Evaluating the function at $x = 2$: $f(2) = (2-1)(2-e^{-2}) = 2 - e^{-2}$. <br> Thus, the coordinates of the point are $A(2, 2 - e^{-2})$.",
            "qImg": "",
            "aImg": ""
        },
        {
            "id": "4b",
            "type": "question",
            "title": "Distance from Point to Line",
            "question": "Calculate the distance, expressed in $\\text{cm}$, from the point $A$ to the line $(\\Delta)$.",
            "answer": "The Cartesian equation of $(\\Delta)$ is $2x - y - 2 = 0$. <br> The shortest distance formula from $A(x_0, y_0)$ to line $Ax + By + C = 0$ is $d = \\cfrac{|Ax_0 + By_0 + C|}{\\sqrt{A^2 + B^2}}$. <br> Substituting $x_0 = 2$ and $y_0 = 2 - e^{-2}$: <br> $d = \\cfrac{|2(2) - (2 - e^{-2}) - 2|}{\\sqrt{2^2 + (-1)^2}} = \\cfrac{|4 - 2 + e^{-2} - 2|}{\\sqrt{5}} = \\cfrac{e^{-2}}{\\sqrt{5}}\\text{ graphic units}$. <br> Since $1\\text{ graphic unit} = 2\\text{ cm}$, the measurement in centimeters is: <br> $d = \\cfrac{2e^{-2}}{\\sqrt{5}}\\text{ cm} \\approx 0.12\\text{ cm}$.",
            "qImg": "",

        }

        {
            "id": "A2b",
            "type": "question",
            "title": "Sign of g(x)",
            "question": "Deduce that $g(x) > 0$ for all $x$ in $\\mathbb{R}$.",
            "answer": "Since the function $g$ possesses an absolute minimum over $\\mathbb{R}$ at $x = 2$, we have for all $x \\in \\mathbb{R}$: <br> $g(x) \\ge g(2) = 1 - e^{-2}$. <br> Since $e^2 > 1 \\implies e^{-2} < 1 \\implies 1 - e^{-2} > 0$, it follows conclusively that $g(x) > 0$ for all $x \\in \\mathbb{R}$.",
            "qImg": "",
            "aImg": ""
        },
        {
            "id": "intro_B",
            "type": "context",
            "title": "Part B: Parameter Analysis & Main Function f",
            "content": "Let $f$ be the function defined over $\\mathbb{R}$ as: $f(x) = e^{-x}(ax + b) + x$ where $a$ and $b$ are two real numbers. Denote by $(C)$ its representative curve in an orthonormal system $(O; \\vec{i}, \\vec{j})$.",
            "qImg": ""
        },
        {
            "id": "B1",
            "type": "question",
            "title": "Tangency Parameters a and b",
            "question": "Calculate $a$ and $b$ so that $(C)$ is tangent at $O$ to the line $y = 2x$.",
            "answer": "Since $(C)$ passes through the origin $O(0,0)$, we have $f(0) = 0 \\implies e^0(a(0) + b) + 0 = 0 \\implies b = 0$. <br> Next, the slope of the tangent line at $x = 0$ is $2$, so $f'(0) = 2$. <br> Differentiating $f(x)$: $f'(x) = -e^{-x}(ax + b) + a e^{-x} + 1$. <br> Setting $x = 0$ and $b = 0$: $f'(0) = -0 + a(1) + 1 = a + 1$. <br> Thus, $a + 1 = 2 \\implies a = 1$. Hence, $a = 1, b = 0$.",
            "qImg": "",
            "aImg": ""
        },
        {
            "id": "B2a",
            "type": "question",
            "title": "Limits of f",
            "question": "Determine $\\lim\\limits_{x \\to -\\infty} f(x)$ and $\\lim\\limits_{x \\to +\\infty} f(x)$ given $f(x) = xe^{-x} + x$.",
            "answer": "$\\lim\\limits_{x \\to -\\infty} f(x) = \\lim\\limits_{x \\to -\\infty} (xe^{-x} + x) = (-\\infty)(+\\infty) - \\infty = -\\infty$. <br> $\\lim\\limits_{x \\to +\\infty} f(x) = \\lim\\limits_{x \\to +\\infty} (xe^{-x} + x) = 0 + (+\\infty) = +\\infty$.",
            "qImg": "",
            "aImg": ""
        },
        {
            "id": "B2b",
            "type": "question",
            "title": "Asymptote Proof",
            "question": "Show that the straight line $(d)$ with equation $y = x$ is an asymptote to $(C)$.",
            "answer": "We evaluate the limit of the difference function: <br> $\\lim\\limits_{x \\to +\\infty} \\left[f(x) - x\\right] = \\lim\\limits_{x \\to +\\infty} xe^{-x} = 0$. <br> Since this limit equals zero, the line $(d): y = x$ is a horizontal/oblique asymptote to $(C)$ at $+\\infty$.",
            "qImg": "",
            "aImg": ""
        },
        {
            "id": "B2c",
            "type": "question",
            "title": "Relative Position",
            "question": "Discuss according to $x$ the relative position of $(d)$ and $(C)$.",
            "answer": "Study the sign of $f(x) - y_{(d)} = xe^{-x}$. Since $e^{-x} > 0$ for all $x$: <br> * For $x < 0$: $f(x) - x < 0 \\implies (C)$ is **below** $(d)$. <br> * For $x > 0$: $f(x) - x > 0 \\implies (C)$ is **above** $(d)$. <br> * For $x = 0$: $f(0) - 0 = 0 \\implies (C)$ intersects $(d)$ at the origin $O(0,0)$.",
            "qImg": "",
            "aImg": ""
        },
        {
            "id": "B3a",
            "type": "question",
            "title": "Derivative and Monotonicity",
            "question": "Verify that $f'(x) = g(x)$ and set up the table of variations of $f$.",
            "answer": "Differentiating $f(x) = xe^{-x} + x$: <br> $f'(x) = 1 \\cdot e^{-x} + x(-e^{-x}) + 1 = e^{-x}(1 - x) + 1 = g(x)$. <br> From Part A, we proved $g(x) > 0$ over $\\mathbb{R}$. Thus, $f'(x) > 0$ everywhere, meaning $f$ is strictly increasing across $\\mathbb{R}$ from $-\\infty$ to $+\\infty$.",

            "type": "question",
            "title": "Inflection Point",
            "question": "Show that $(C)$ admits a point of inflection whose coordinates are to be determined.",
            "answer": "The second derivative is $f''(x) = g'(x) = e^{-x}(x - 2)$. <br> Setting $f''(x) = 0 \\implies x = 2$. <br> Since $f''(x)$ changes sign precisely at $x = 2$ (negative for $x < 2$, positive for $x > 2$), the point of abscissa $2$ is a point of inflection. <br> Coordinates: $x = 2 \\implies f(2) = 2e^{-2} + 2$. Inflection point is $(2, \\cfrac{2}{e^2} + 2)$.",
            "qImg": "",
            "aImg": ""
        },
        {
            "id": "B3c",
            "type": "question",
            "title": "Parallel Tangent Station",
            "question": "Determine the point $E$ on $(C)$ where the tangent $(T)$ is parallel to $(d)$.",
            "answer": "The slope of $(d)$ is $1$. For $(T)$ to be parallel to $(d)$, we require $f'(x) = 1$: <br> $g(x) = 1 \\implies e^{-x}(1 - x) + 1 = 1 \\implies e^{-x}(1 - x) = 0$. <br> Since $e^{-x} \\neq 0$, we have $x = 1$. <br> Substituting into $f(x)$: $f(1) = 1e^{-1} + 1 = e^{-1} + 1$. <br> Thus, the unique point is $E(1, e^{-1} + 1)$, with $y_E = \\cfrac{1}{e} + 1$.",

            "aImg": ""

function init() {
    const nav = document.getElementById('nav-list');
    nav.innerHTML = '';
    const scrollTarget = document.getElementById('content'); // Get the scrollable div

    courseData.forEach((topic, tIdx) => {
        const details = document.createElement('details');
        details.className = 'sidebar-group';

        const summary = document.createElement('summary');
        summary.className = 'compact-title';
        summary.innerHTML = `${tIdx + 1}. ${topic.mainTitle}`;

        // 1. INITIAL STATE (Runs once per refresh for the first item)
        if (tIdx === 0) {
            summary.classList.add('active-link');
            details.open = true;
            displayTopic(tIdx);

            // Fix: Scroll to top on page load
            if (scrollTarget) scrollTarget.scrollTop = 0;
        }

        // 2. CLICK LOGIC
        summary.onclick = (e) => {
            document.querySelectorAll('.compact-title').forEach(el => el.classList.remove('active-link'));
            document.querySelectorAll('.sidebar-group').forEach(det => {
                if (det !== details) det.open = false;
            });

            summary.classList.add('active-link');
            displayTopic(tIdx);

            // Fix: Scroll to top when clicking a new problem
            if (scrollTarget) {
                scrollTarget.scrollTo({ top: 0, behavior: 'smooth' });
            }
        };

        const ul = document.createElement('ul');
        ul.className = 'parts-list';
        topic.parts.forEach(p => {
            const li = document.createElement('li');
            li.innerText = p.title.replace(/^Part\s[A-Z]:\s/i, "");
            ul.appendChild(li);
        });

        details.appendChild(summary);
        details.appendChild(ul);
        nav.appendChild(details);
    });
    document.getElementById('count-display').innerText = courseData.length;
}


function displayTopic(index) {
    const container = document.getElementById('problem-container');
    container.innerHTML = '';
    const topic = courseData[index];
    const section = document.createElement('div');
    section.className = 'topic-section';

    // Helper to generate Image HTML if a string exists
    const getImageHTML = (imgData) => {
        if (!imgData || imgData.trim() === "") return "";

        // Add prefix if user forgot to include it in the JSON string
        const src = imgData.startsWith('data:image')
                    ? imgData
                    : `data:image/png;base64,${imgData}`;

        return `<img src="${src}" class="math-image" alt="Problem Illustration">`;
    };

    topic.parts.forEach(p => {
        const card = document.createElement('div');
        card.className = 'puzzle-card';

        if (p.type === "context") {
            card.innerHTML = `
                <div class="header"><h3>${p.title}</h3></div>
                <div class="question-body">${p.content}</div>
                ${getImageHTML(p.qImg)}
            `;
        } else {
            card.innerHTML = `
                <div class="header"><h3>${p.id}. ${p.title}</h3></div>
                <div class="question-body">${p.question}</div>
                ${getImageHTML(p.qImg)}

                <div class="answer-link" onclick="toggleAns('${p.id}')">View Solution ▼</div>

                <div id="ans-box-${p.id}" class="answer-box hidden">
                    <div>${p.answer}</div>
                    ${getImageHTML(p.aImg)}
                </div>
            `;
        }
        section.appendChild(card);
    });

    container.appendChild(section);

    // Re-run KaTeX if present
    if (window.renderMathInElement) {
        renderMathInElement(container, {
            delimiters: [
                {left: '$$', right: '$$', display: true},
                {left: '$', right: '$', display: false}
            ],
            throwOnError: false
        });
    }
}






function filterContent() {
        const query = document.getElementById('search-box').value.toLowerCase();
        const sidebarGroups = document.querySelectorAll('.sidebar-group');
        let visibleCount = 0;

        courseData.forEach((topic, index) => {
                const sidebar = sidebarGroups[index];
                const match = topic.mainTitle.toLowerCase().includes(query) ||
                                            topic.parts.some(p => p.title.toLowerCase().includes(query));

                if (match) {
                        sidebar.classList.remove('hidden');
                        visibleCount++;
                } else {
                        sidebar.classList.add('hidden');
                }
        });

        document.getElementById('count-display').innerText = visibleCount;
}






function toggleAns(id) {
    const box = document.getElementById(`ans-box-${id}`);
    if (box) {
        box.classList.toggle('hidden');
    }
}


window.onload = init;
</script>
